# ProspectIQ — Ideal Customer Profile (ICP)
# Defines the target market filters for Apollo.io discovery
#
# STRATEGIC POSITIONING:
# Digitillis is manufacturing intelligence — predictive maintenance, OEE,
# anomaly detection, equipment health across ALL industrial sectors.
#
# PRIMARY: All discrete and process manufacturing — industrial machinery,
# automotive, aerospace, chemical, oil & gas, mining, plastics, metals,
# pharma, HVAC/pumps, utilities, paper, and more.
#
# SECONDARY: Food & Beverage — FSMA compliance as a door-opener, but not
# the core product value proposition.
#
# REVENUE TRANCHES (updated 2026-04-01):
#   T1: $100M–$400M  — fast pilots, build logos, VP can sign
#   T2: $400M–$1B    — bullseye (60% of outreach effort)
#   T3: $1B–$2B      — manual motion only, not cold email
#   watchlist        — pharma, aerospace, utilities — vendor qual wall
#
# Sweet spot: $75M–$2B revenue, 200–3,500 employees

version: "3.0"

target_market:
  name: "US Mid-Market Industrial Manufacturing — $75M–$2B Revenue"
  description: >
    Mid-market manufacturers across ALL industrial sectors (discrete and process),
    $75M–$2B revenue, 200–3,500 employees. Three tranches: T1 ($75M–$400M, fast pilots),
    T2 ($400M–$1B, bullseye), T3 ($1B–$2B, manual outreach only).
    Core value prop: prevent unplanned downtime, improve OEE, detect equipment
    anomalies before they become failures. F&B is secondary.

company_filters:
  industries:
    # ================================================================
    # P3.4 — TIGHTENED ICP (GTM rebuild 2026-05-08).
    # The ICP is now restricted to NAICS prefixes where Digitillis has a
    # demonstrated operational wedge. Broad 333 (machinery), 334
    # (electronics), 335 (electrical), 336 (auto), 326 (plastics), 327
    # (non-metallic mineral), 331 (primary metals), 322 (paper),
    # 325 (chemicals — full breadth), 211/212/221/324/3254 (energy/util/
    # pharma), 311/3114/3115*/3117*/3119*-bakery legacy entries are removed
    # below. Only the listed prefixes remain ICP for cold outreach.
    # ================================================================

    # ----- F&B FSMA 204 (NAICS 3115–3119, 312) ----------------------
    - naics_prefix: "3115"
      tier: "fb_dairy"
      label: "Dairy Processing — Yogurt, Cheese, Fluid Milk, Cream"
      apollo_industry: "dairy"
      priority: "primary"
      segment: 2
      revenue: {min: 50000000, max: 500000000}
      tranche_map: {T1: [50000000, 150000000], T2: [150000000, 500000000]}
      campaign_cluster: "fsma_dairy"
      fsma_exposure: "high"

    - naics_prefix: "3116"
      tier: "fb_meat"
      label: "Meat & Poultry Processing"
      apollo_industry: "food production"
      priority: "primary"
      segment: 2
      revenue: {min: 50000000, max: 300000000}
      tranche_map: {T1: [50000000, 100000000], T2: [100000000, 300000000]}
      campaign_cluster: "fsma_meat"
      fsma_exposure: "high"

    - naics_prefix: "3117"
      tier: "fb_seafood"
      label: "Seafood Processing — Finfish, Crustaceans, Mollusks"
      apollo_industry: "food production"
      priority: "primary"
      segment: 2
      revenue: {min: 50000000, max: 300000000}
      tranche_map: {T1: [50000000, 100000000], T2: [100000000, 300000000]}
      campaign_cluster: "fsma_seafood"
      fsma_exposure: "high"

    - naics_prefix: "3118"
      tier: "fb_bakery"
      label: "Bakeries & Tortillas"
      apollo_industry: "food production"
      priority: "primary"
      segment: 2
      revenue: {min: 50000000, max: 300000000}
      tranche_map: {T1: [50000000, 100000000], T2: [100000000, 300000000]}
      campaign_cluster: "fsma_bakery"
      fsma_exposure: "medium"

    - naics_prefix: "3119"
      tier: "fb_food_general"
      label: "Other Food Manufacturing — Specialty, Nut Butters, Condiments"
      apollo_industry: "food production"
      priority: "primary"
      segment: 2
      revenue: {min: 50000000, max: 500000000}
      tranche_map: {T1: [50000000, 150000000], T2: [150000000, 500000000]}
      campaign_cluster: "fsma_food"
      fsma_exposure: "medium"

    - naics_prefix: "312"
      tier: "fb_bev"
      label: "Beverage Manufacturing — Juice, RTD, Aseptic, Energy"
      apollo_industry: "beverages"
      priority: "primary"
      segment: 2
      revenue: {min: 50000000, max: 500000000}
      tranche_map: {T1: [50000000, 150000000], T2: [150000000, 500000000]}
      campaign_cluster: "fsma_beverage"
      fsma_exposure: "medium"

    # ----- Fabricated metal where heat treat / coatings apply (332) -
    - naics_prefix: "332"
      tier: "mfg2"
      label: "Fabricated Metal Products (heat treat / coatings focus)"
      apollo_industry: "fabricated metal products"
      priority: "primary"
      segment: 1

    # ----- Coating, Engraving, Heat Treating (3328) ------------------
    - naics_prefix: "3328"
      tier: "mfg2"
      label: "Coating, Engraving, Heat Treating & Allied Activities"
      apollo_industry: "industrial automation"
      priority: "primary"
      segment: 1
      campaign_cluster: "coatings"

    # ----- Semiconductors WITH explicit furnace operations (3344) ---
    # Note: only a subset of 3344 firms run thermal/furnace processes
    # (epitaxy, diffusion, oxidation, anneal). Discovery should pair
    # this prefix with explicit furnace keywords before qualifying.
    - naics_prefix: "3344"
      tier: "mfg5"
      label: "Semiconductor & Other Electronic Components — Furnace Ops Only"
      apollo_industry: "semiconductors"
      priority: "primary"
      segment: 1
      campaign_cluster: "semi_furnace"
      qualification_notes: >
        Only qualify when company description, equipment list, or job
        postings reference furnace operations: epitaxy, diffusion, anneal,
        oxidation, RTP, thermal CVD. Plain assembly / packaging shops in
        3344 are out of ICP.

  revenue:
    min: 75000000     # $75M minimum — lowered to capture mid-market manufacturers
    max: 2000000000   # $2B maximum — T3 cap; above $2B is Fortune 100 / different motion

  employee_count:
    min: 200
    max: 3500
    apollo_ranges:
      - "101,200"     # 101–200 employees (captures F&B processors at $50M–$100M)
      - "201,500"     # 201–500 employees
      - "501,1000"
      - "1001,2000"
      - "2001,5000"   # captures T3 upper bound (~3,500)

  geography:
    primary_states:
      # Manufacturing belt (highest density — highest priority)
      - "Ohio"
      - "Michigan"
      - "Indiana"
      - "Wisconsin"
      - "Illinois"
      - "Pennsylvania"
      - "Minnesota"
      - "Iowa"
      - "Missouri"
      - "Kentucky"
      # Secondary manufacturing + energy/mining corridors
      - "Texas"           # petrochemical, oil & gas
      - "Louisiana"       # refining, chemical
      - "North Carolina"
      - "Tennessee"
      - "Alabama"
      - "Georgia"
      - "South Carolina"
      - "Virginia"
      - "Kansas"
      - "Nebraska"
      - "Oklahoma"        # oil & gas
      - "Wyoming"         # mining
      - "Colorado"        # mining, aerospace
      - "West Virginia"   # chemical, mining
      # West Coast
      - "California"      # aerospace, electronics, pharma
      - "Oregon"
      - "Washington"
      - "Arizona"         # semiconductor, aerospace
      # Northeast
      - "New York"
      - "New Jersey"      # pharma, chemical
      - "Massachusetts"   # biotech, defense
      - "Connecticut"     # aerospace, defense
      - "Maryland"
    countries:
      - "United States"

  company_type:
    trading_status:
      - "private"
      - "public"

# Contact-level filters (titles to target in Apollo search)
contact_filters:
  titles:
    include:
      # ============================================================
      # PRIMARY — Operations & Maintenance
      # Core buyers for Digitillis across ALL manufacturing sectors
      # ============================================================
      - "VP Operations"
      - "Vice President Operations"
      - "VP Manufacturing"
      - "Vice President Manufacturing"
      - "VP Engineering"
      - "Vice President Engineering"
      - "Chief Operating Officer"
      - "COO"
      - "Plant Manager"
      - "Factory Manager"
      - "General Manager"
      - "Site Manager"
      - "Operations Manager"
      - "Manufacturing Manager"
      - "Production Manager"
      - "Director of Operations"
      - "Director of Manufacturing"
      - "Director of Engineering"
      - "Director of Production"
      # Maintenance & Reliability — high-urgency buyer in all sectors
      - "Director of Maintenance"
      - "VP Maintenance"
      - "Director of Reliability"
      - "Reliability Manager"
      - "Maintenance Manager"
      - "Director of Asset Management"
      - "VP Asset Management"
      # Process Manufacturing specific
      - "VP Refining"
      - "Director of Refining"
      - "Plant Superintendent"
      - "Production Superintendent"
      - "Process Engineering Manager"
      - "Director of Process Engineering"
      # Digital / Industry 4.0 — often owns the budget for IIoT
      - "VP Digital Transformation"
      - "Director of Digital Transformation"
      - "Director of Industry 4.0"
      - "Chief Digital Officer"
      # ============================================================
      # F&B FSMA 204 — Quality, Food Safety, Regulatory, Compliance
      # Two-touch simultaneous: VP Ops (Contact 1) + VP Food Safety (Contact 2)
      # ============================================================
      - "VP Quality"
      - "VP Food Safety"
      - "Vice President Food Safety"
      - "VP Quality and Food Safety"
      - "Director of Quality"
      - "Director of Food Safety"
      - "Director Quality Assurance"
      - "VP Quality Assurance"
      - "Head of Food Safety"
      - "Chief Food Safety Officer"
      - "Director of Quality and Food Safety"
      - "VP Regulatory Affairs"
      - "Vice President Regulatory Affairs"
      - "Director Regulatory Affairs"
      - "Director of Regulatory Affairs"
      - "Regulatory Affairs Manager"
      - "Director of Compliance"
      - "Food Safety Manager"
      - "Quality Assurance Director"
      - "FSMA Compliance Manager"
      - "Food Safety Compliance Manager"
    exclude:
      - "Marketing"
      - "Sales"
      - "HR"
      - "Human Resources"
      - "Legal"
      - "Finance"
      - "Accounting"
      - "IT Manager"
      - "Software Engineer"
      - "Product Manager"
      - "Business Development"

  seniority:
    - "vp"
    - "director"
    - "c_suite"
    - "manager"

# Persona classification (auto-applied to matched contacts)
persona_classification:
  # PRIMARY — core manufacturing buyers (all sectors)
  vp_ops:
    title_keywords:
      - "VP Operations"
      - "Vice President Operations"
      - "VP Manufacturing"
      - "Vice President Manufacturing"
      - "VP Engineering"
      - "Vice President Engineering"
      - "VP Refining"
      - "Vice President Refining"
    priority: "primary"

  maintenance_leader:
    title_keywords:
      - "Director of Maintenance"
      - "VP Maintenance"
      - "Maintenance Manager"
      - "Reliability Manager"
      - "Director of Reliability"
      - "Director of Asset Management"
      - "VP Asset Management"
    priority: "primary"

  plant_manager:
    title_keywords:
      - "Plant Manager"
      - "General Manager"
      - "Factory Manager"
      - "Site Manager"
      - "Operations Manager"
      - "Manufacturing Manager"
      - "Plant Superintendent"
      - "Production Superintendent"
    priority: "primary"

  coo:
    title_keywords:
      - "Chief Operating Officer"
      - "COO"
    priority: "primary"

  director_ops:
    title_keywords:
      - "Director of Operations"
      - "Director of Manufacturing"
      - "Director of Engineering"
      - "Director of Production"
      - "Director of Process Engineering"
    priority: "primary"

  digital_transformation:
    title_keywords:
      - "Digital Transformation"
      - "Industry 4.0"
      - "Smart Factory"
      - "Chief Digital Officer"
      - "IIoT"
    priority: "primary"

  # ============================================================
  # F&B FSMA 204 — Primary buyer personas
  # Contact 1: vp_ops / plant_manager (economic buyer — OEE + downtime)
  # Contact 2: vp_food_safety / regulatory_affairs_director (FSMA compliance)
  # Both targeted simultaneously for F&B companies
