# ProspectIQ — Ideal Customer Profile (ICP)
# Defines the target market filters for Apollo.io discovery
#
# Strategy: F&B is primary (FSMA compliance = urgent pain), Discrete Mfg is secondary (PdM = cost savings)
# Sweet spot: $50M-$150M revenue, 50-500 employees — one decision maker can sign without a committee

version: "2.0"

target_market:
  name: "US Mid-Market Manufacturing & Food Production"
  description: "Mid-market manufacturers and food producers where the VP can sign a $3-5K/mo pilot without procurement"

# Company-level filters (used for Apollo search)
company_filters:
  industries:
    # Food & Beverage (PRIMARY vertical — FSMA compliance angle)
    - naics_prefix: "311"
      tier: "fb1"
      label: "Food Manufacturing"
      apollo_industry: "food production"
    - naics_prefix: "3116"
      tier: "fb2"
      label: "Meat & Poultry Processing"
      apollo_industry: "food production"
    - naics_prefix: "3115"
      tier: "fb3"
      label: "Dairy Product Manufacturing"
      apollo_industry: "dairy"
    - naics_prefix: "3114"
      tier: "fb4"
      label: "Fruit & Vegetable Preserving"
      apollo_industry: "food production"
    - naics_prefix: "3121"
      tier: "fb5"
      label: "Beverage Manufacturing"
      apollo_industry: "food & beverages"
    # Discrete Manufacturing (SECONDARY vertical — PdM angle)
    - naics_prefix: "333"
      tier: "mfg1"
      label: "Industrial Machinery & Heavy Equipment"
      apollo_industry: "machinery"
    - naics_prefix: "332"
      tier: "mfg2"
      label: "Metal Fabrication & Precision Machining"
      apollo_industry: "fabricated metal products"
    - naics_prefix: "336"
      tier: "mfg3"
      label: "Automotive Parts & Components"
      apollo_industry: "automotive"

  revenue:
    min: 20000000    # $20M — below this they can't afford $3K/mo
    max: 200000000   # $200M — above this they have procurement teams and 12-month sales cycles

  employee_count:
    min: 50
    max: 500
    # Apollo-specific range buckets
    apollo_ranges:
      - "51,200"
      - "201,500"

  geography:
    # All US — F&B is national, not just Midwest
    primary_states:
      - "Illinois"
      - "Indiana"
      - "Michigan"
      - "Ohio"
      - "Wisconsin"
      - "Minnesota"
      - "Iowa"
      - "Missouri"
      - "Texas"
      - "California"
      - "Pennsylvania"
      - "Georgia"
      - "North Carolina"
      - "New York"
      - "New Jersey"
      - "Florida"
      - "Virginia"
      - "Tennessee"
      - "Alabama"
      - "Arkansas"
      - "Kansas"
      - "Nebraska"
      - "Oklahoma"
      - "Oregon"
      - "Washington"
      - "Colorado"
      - "Massachusetts"
      - "Maryland"
    countries:
      - "United States"

  company_type:
    trading_status:
      - "private"
      - "public"

# Contact-level filters
contact_filters:
  titles:
    include:
      # Operations (both verticals)
      - "VP Operations"
      - "Vice President Operations"
      - "VP Manufacturing"
      - "Vice President Manufacturing"
      - "Plant Manager"
      - "General Manager"
      - "Director of Operations"
      - "Director of Manufacturing"
      - "Chief Operating Officer"
      - "COO"
      # F&B specific — these are the buyers for compliance
      - "VP Quality"
      - "VP Food Safety"
      - "Vice President Quality"
      - "Vice President Food Safety"
      - "Director of Quality"
      - "Director of Food Safety"
      - "Director Quality Assurance"
      - "VP Quality Assurance"
      - "Director Food Safety & Quality"
      - "VP Food Safety & Quality"
      - "Director of Quality Assurance"
      - "VP Regulatory"
      - "Director Regulatory Affairs"
      # Maintenance (discrete mfg buyer)
      - "Director of Maintenance"
      - "VP Maintenance"
      - "Maintenance Manager"
      - "Reliability Manager"
      - "Director of Reliability"
    exclude:
      - "Marketing"
      - "Sales"
      - "HR"
      - "Human Resources"
      - "Legal"
      - "Finance"
      - "Accounting"

  seniority:
    - "vp"
    - "director"
    - "c_suite"
    - "manager"  # Include managers for smaller companies where Plant Manager is the buyer

# Persona classification rules (auto-classify from title)
persona_classification:
  vp_quality_food_safety:
    title_keywords: ["VP Quality", "VP Food Safety", "Vice President Quality", "Vice President Food Safety", "VP Food Safety & Quality", "VP Quality Assurance"]
  director_quality_food_safety:
    title_keywords: ["Director of Quality", "Director of Food Safety", "Director Quality Assurance", "Director Food Safety & Quality", "Director Regulatory"]
  vp_ops:
    title_keywords: ["VP Operations", "Vice President Operations", "VP Manufacturing", "Vice President Manufacturing"]
  plant_manager:
    title_keywords: ["Plant Manager", "General Manager", "Factory Manager"]
  coo:
    title_keywords: ["Chief Operating Officer", "COO"]
  director_ops:
    title_keywords: ["Director of Operations", "Director of Manufacturing"]
  maintenance_leader:
    title_keywords: ["Director of Maintenance", "VP Maintenance", "Maintenance Manager", "Reliability Manager", "Director of Reliability"]

# Persona priority for primary contact selection (higher = preferred)
persona_priority:
  vp_quality_food_safety: 100    # F&B primary buyer
  coo: 95
  vp_ops: 90
  plant_manager: 85
  director_quality_food_safety: 80
  maintenance_leader: 75
  director_ops: 70

# Plant qualification criteria (used during research phase)
plant_qualification:
  min_employees: 50
  min_critical_equipment: 5       # Lower bar — F&B plants may have fewer monitored assets
  required_data_infrastructure: false  # Many F&B targets won't have OT infrastructure yet
  required_erp_cmms: false             # Don't disqualify F&B companies without CMMS

# Discovery batch settings
discovery:
  max_results_per_run: 200
  pages_per_tier: 5       # 5 pages x 100 results = 500 per tier
  default_campaign_name: "prospectiq_discovery"
