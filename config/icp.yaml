# ProspectIQ — Ideal Customer Profile (ICP)
# Defines the target market filters for Apollo.io discovery
#
# STRATEGIC POSITIONING:
# Digitillis is manufacturing intelligence — predictive maintenance, OEE,
# anomaly detection, equipment health across ALL industrial sectors.
#
# PRIMARY: All discrete and process manufacturing — industrial machinery,
# automotive, aerospace, chemical, oil & gas, mining, plastics, metals,
# pharma, HVAC/pumps, utilities, paper, and more.
#
# SECONDARY: Food & Beverage — FSMA compliance as a door-opener, but not
# the core product value proposition.
#
# REVENUE TRANCHES (updated 2026-04-01):
#   T1: $100M–$400M  — fast pilots, build logos, VP can sign
#   T2: $400M–$1B    — bullseye (60% of outreach effort)
#   T3: $1B–$2B      — manual motion only, not cold email
#   watchlist        — pharma, aerospace, utilities — vendor qual wall
#
# Sweet spot: $100M–$2B revenue, 300–3,500 employees

version: "3.0"

target_market:
  name: "US Mid-Market Industrial Manufacturing — $100M–$2B Revenue"
  description: >
    Mid-market manufacturers across ALL industrial sectors (discrete and process),
    $100M–$2B revenue, 300–3,500 employees. Three tranches: T1 ($100M–$400M, fast pilots),
    T2 ($400M–$1B, bullseye), T3 ($1B–$2B, manual outreach only).
    Core value prop: prevent unplanned downtime, improve OEE, detect equipment
    anomalies before they become failures. F&B is secondary.

company_filters:
  industries:
    # ================================================================
    # PRIMARY VERTICAL — Discrete Manufacturing
    # NAICS 332–336, 339, 3364
    # Value prop: PdM, OEE, equipment health, anomaly detection
    # ================================================================
    - naics_prefix: "333"
      tier: "mfg1"
      label: "Industrial Machinery & Heavy Equipment"
      apollo_industry: "machinery"
      priority: "primary"
      segment: 1

    - naics_prefix: "332"
      tier: "mfg2"
      label: "Metal Fabrication & Precision Machining"
      apollo_industry: "fabricated metal products"
      priority: "primary"
      segment: 1

    - naics_prefix: "336"
      tier: "mfg3"
      label: "Automotive Parts & Transportation Equipment"
      apollo_industry: "automotive"
      priority: "primary"
      segment: 1

    - naics_prefix: "335"
      tier: "mfg4"
      label: "Electrical Equipment & Components"
      apollo_industry: "electrical/electronic manufacturing"
      priority: "primary"
      segment: 1

    - naics_prefix: "334"
      tier: "mfg5"
      label: "Computer & Electronic Manufacturing"
      apollo_industry: "semiconductors"
      priority: "primary"
      segment: 1

    - naics_prefix: "3364"
      tier: "mfg6"
      label: "Aerospace & Defense Manufacturing"
      apollo_industry: "aviation & aerospace"
      priority: "primary"
      segment: 4   # watch-list — vendor qualification wall, not in tier_run_order

    - naics_prefix: "331"
      tier: "mfg7"
      label: "Primary Metals — Steel, Aluminum, Foundry"
      apollo_industry: "metals"
      priority: "primary"
      segment: 2

    - naics_prefix: "326"
      tier: "mfg8"
      label: "Plastics & Rubber Manufacturing"
      apollo_industry: "plastics"
      priority: "primary"
      segment: 1

    # ================================================================
    # PRIMARY VERTICAL — Process Manufacturing
    # NAICS 211, 212, 221, 324, 325, 322, 3254
    # Value prop: asset reliability, process uptime, safety compliance
    # ================================================================
    - naics_prefix: "325"
      tier: "pmfg1"
      label: "Chemical Manufacturing"
      apollo_industry: "chemicals"
      priority: "primary"
      segment: 2

    - naics_prefix: "211"
      tier: "pmfg2"
      label: "Oil & Gas Extraction"
      apollo_industry: "oil & energy"
      priority: "primary"
      segment: 4   # watch-list — enterprise procurement, safety reg complexity

    - naics_prefix: "324"
      tier: "pmfg3"
      label: "Petroleum Refining & Coal Products"
      apollo_industry: "oil & energy"
      priority: "primary"
      segment: 2

    - naics_prefix: "212"
      tier: "pmfg4"
      label: "Mining & Quarrying"
      apollo_industry: "mining & metals"
      priority: "primary"
      segment: 2   # active but lower volume

    - naics_prefix: "221"
      tier: "pmfg5"
      label: "Utilities — Power Generation & Water"
      apollo_industry: "utilities"
      priority: "primary"
      segment: 4   # watch-list — regulated monopolies, govt procurement

    - naics_prefix: "3254"
      tier: "pmfg6"
      label: "Pharmaceutical & Biotech Manufacturing"
      apollo_industry: "pharmaceuticals"
      priority: "primary"
      segment: 4   # watch-list — 21 CFR Part 11, vendor qualification wall

    - naics_prefix: "322"
      tier: "pmfg7"
      label: "Paper & Pulp Manufacturing"
      apollo_industry: "paper & forest products"
      priority: "primary"
      segment: 2   # activated — large continuous-process plants, high downtime cost

    - naics_prefix: "327"
      tier: "pmfg8"
      label: "Non-Metallic Mineral Products — Cement, Glass, Ceramics"
      apollo_industry: "glass, ceramics & concrete"
      priority: "primary"
      segment: 2   # activated — kilns/crushers, 24/7 ops, expensive downtime

    # ================================================================
    # F&B FSMA 204 VERTICAL — Co-Primary (Segment 2)
    # NAICS 311–312 + sub-codes
    # Revenue: $50M–$500M (lower floor than mfg — asset intensity justifies)
    # Door-opener: FSMA 204 compliance enforcement is LIVE (deadline passed Jan 20 2026)
    # Two-touch cold outreach: VP Ops (Contact 1) + VP Food Safety (Contact 2) simultaneously
    # Ranked by FTL exposure + asset intensity:
    #   Dairy > Seafood > Produce > Meat > Beverage > General > Bakery
    # ================================================================
    - naics_prefix: "3115"
      tier: "fb_dairy"
      label: "Dairy Processing — Yogurt, Cheese, Fluid Milk, Cream"
      apollo_industry: "dairy"
      priority: "primary"
      segment: 2
      revenue: {min: 50000000, max: 500000000}
      tranche_map: {T1: [50000000, 150000000], T2: [150000000, 500000000]}
      campaign_cluster: "fsma_dairy"
      fsma_exposure: "high"    # Soft cheeses, ricotta, queso fresco on FTL

    - naics_prefix: "3117"
      tier: "fb_seafood"
      label: "Seafood Processing — Finfish, Crustaceans, Mollusks"
      apollo_industry: "food production"
      priority: "primary"
      segment: 2
      revenue: {min: 50000000, max: 300000000}
      tranche_map: {T1: [50000000, 100000000], T2: [100000000, 300000000]}
      campaign_cluster: "fsma_seafood"
      fsma_exposure: "high"    # Finfish + crustaceans directly on FTL

    - naics_prefix: "3114"
      tier: "fb_produce"
      label: "Fruit, Vegetable & Fresh-Cut Produce Processing"
      apollo_industry: "food production"
      priority: "primary"
      segment: 2
      revenue: {min: 50000000, max: 300000000}
      tranche_map: {T1: [50000000, 100000000], T2: [100000000, 300000000]}
      campaign_cluster: "fsma_produce"
      fsma_exposure: "high"    # Leafy greens, peppers, sprouts, herbs, melons on FTL

    - naics_prefix: "3116"
      tier: "fb_meat"
      label: "Meat & Poultry Processing"
      apollo_industry: "food production"
      priority: "primary"
      segment: 2
      revenue: {min: 50000000, max: 300000000}
      tranche_map: {T1: [50000000, 100000000], T2: [100000000, 300000000]}
      campaign_cluster: "fsma_meat"
      fsma_exposure: "high"

    - naics_prefix: "312"
      tier: "fb_bev"
      label: "Beverage Manufacturing — Juice, RTD, Aseptic, Energy"
      apollo_industry: "beverages"
      priority: "primary"
      segment: 2
      revenue: {min: 50000000, max: 500000000}
      tranche_map: {T1: [50000000, 150000000], T2: [150000000, 500000000]}
      campaign_cluster: "fsma_beverage"
      fsma_exposure: "medium"  # Aseptic/juice less FTL exposure; OEE is primary wedge

    - naics_prefix: "311"
      tier: "fb_food_general"
      label: "Food Manufacturing — General (nut butters, condiments, canned)"
      apollo_industry: "food production"
      priority: "primary"
      segment: 2
      revenue: {min: 50000000, max: 500000000}
      tranche_map: {T1: [50000000, 150000000], T2: [150000000, 500000000]}
      campaign_cluster: "fsma_food"
      fsma_exposure: "medium"  # Nut butters on FTL; general 311 varies

    - naics_prefix: "3119"
      tier: "fb_bakery"
      label: "Bakery, Snack & Specialty Food"
      apollo_industry: "food & beverages"
      priority: "secondary"
      segment: 2
      revenue: {min: 50000000, max: 300000000}
      tranche_map: {T1: [50000000, 100000000], T2: [100000000, 300000000]}
      campaign_cluster: "fsma_bakery"
      fsma_exposure: "low"     # Allergen changeover is the wedge, not FTL

  revenue:
    min: 100000000    # $100M minimum — below this, overhead too high to sell
    max: 2000000000   # $2B maximum — T3 cap; above $2B is Fortune 100 / different motion

  employee_count:
    min: 300
    max: 3500
    apollo_ranges:
      - "201,500"     # 201–500 employees (covers 300+ floor)
      - "501,1000"
      - "1001,2000"
      - "2001,5000"   # captures T3 upper bound (~3,500)

  geography:
    primary_states:
      # Manufacturing belt (highest density — highest priority)
      - "Ohio"
      - "Michigan"
      - "Indiana"
      - "Wisconsin"
      - "Illinois"
      - "Pennsylvania"
      - "Minnesota"
      - "Iowa"
      - "Missouri"
      - "Kentucky"
      # Secondary manufacturing + energy/mining corridors
      - "Texas"           # petrochemical, oil & gas
      - "Louisiana"       # refining, chemical
      - "North Carolina"
      - "Tennessee"
      - "Alabama"
      - "Georgia"
      - "South Carolina"
      - "Virginia"
      - "Kansas"
      - "Nebraska"
      - "Oklahoma"        # oil & gas
      - "Wyoming"         # mining
      - "Colorado"        # mining, aerospace
      - "West Virginia"   # chemical, mining
      # West Coast
      - "California"      # aerospace, electronics, pharma
      - "Oregon"
      - "Washington"
      - "Arizona"         # semiconductor, aerospace
      # Northeast
      - "New York"
      - "New Jersey"      # pharma, chemical
      - "Massachusetts"   # biotech, defense
      - "Connecticut"     # aerospace, defense
      - "Maryland"
    countries:
      - "United States"

  company_type:
    trading_status:
      - "private"
      - "public"

# Contact-level filters (titles to target in Apollo search)
contact_filters:
  titles:
    include:
      # ============================================================
      # PRIMARY — Operations & Maintenance
      # Core buyers for Digitillis across ALL manufacturing sectors
      # ============================================================
      - "VP Operations"
      - "Vice President Operations"
      - "VP Manufacturing"
      - "Vice President Manufacturing"
      - "VP Engineering"
      - "Vice President Engineering"
      - "Chief Operating Officer"
      - "COO"
      - "Plant Manager"
      - "Factory Manager"
      - "General Manager"
      - "Site Manager"
      - "Operations Manager"
      - "Manufacturing Manager"
      - "Production Manager"
      - "Director of Operations"
      - "Director of Manufacturing"
      - "Director of Engineering"
      - "Director of Production"
      # Maintenance & Reliability — high-urgency buyer in all sectors
      - "Director of Maintenance"
      - "VP Maintenance"
      - "Director of Reliability"
      - "Reliability Manager"
      - "Maintenance Manager"
      - "Director of Asset Management"
      - "VP Asset Management"
      # Process Manufacturing specific
      - "VP Refining"
      - "Director of Refining"
      - "Plant Superintendent"
      - "Production Superintendent"
      - "Process Engineering Manager"
      - "Director of Process Engineering"
      # Digital / Industry 4.0 — often owns the budget for IIoT
      - "VP Digital Transformation"
      - "Director of Digital Transformation"
      - "Director of Industry 4.0"
      - "Chief Digital Officer"
      # ============================================================
      # F&B FSMA 204 — Quality, Food Safety, Regulatory, Compliance
      # Two-touch simultaneous: VP Ops (Contact 1) + VP Food Safety (Contact 2)
      # ============================================================
      - "VP Quality"
      - "VP Food Safety"
      - "Vice President Food Safety"
      - "VP Quality and Food Safety"
      - "Director of Quality"
      - "Director of Food Safety"
      - "Director Quality Assurance"
      - "VP Quality Assurance"
      - "Head of Food Safety"
      - "Chief Food Safety Officer"
      - "Director of Quality and Food Safety"
      - "VP Regulatory Affairs"
      - "Vice President Regulatory Affairs"
      - "Director Regulatory Affairs"
      - "Director of Regulatory Affairs"
      - "Regulatory Affairs Manager"
      - "Director of Compliance"
      - "Food Safety Manager"
      - "Quality Assurance Director"
      - "FSMA Compliance Manager"
      - "Food Safety Compliance Manager"
    exclude:
      - "Marketing"
      - "Sales"
      - "HR"
      - "Human Resources"
      - "Legal"
      - "Finance"
      - "Accounting"
      - "IT Manager"
      - "Software Engineer"
      - "Product Manager"
      - "Business Development"

  seniority:
    - "vp"
    - "director"
    - "c_suite"
    - "manager"

# Persona classification (auto-applied to matched contacts)
persona_classification:
  # PRIMARY — core manufacturing buyers (all sectors)
  vp_ops:
    title_keywords:
      - "VP Operations"
      - "Vice President Operations"
      - "VP Manufacturing"
      - "Vice President Manufacturing"
      - "VP Engineering"
      - "Vice President Engineering"
      - "VP Refining"
      - "Vice President Refining"
    priority: "primary"

  maintenance_leader:
    title_keywords:
      - "Director of Maintenance"
      - "VP Maintenance"
      - "Maintenance Manager"
      - "Reliability Manager"
      - "Director of Reliability"
      - "Director of Asset Management"
      - "VP Asset Management"
    priority: "primary"

  plant_manager:
    title_keywords:
      - "Plant Manager"
      - "General Manager"
      - "Factory Manager"
      - "Site Manager"
      - "Operations Manager"
      - "Manufacturing Manager"
      - "Plant Superintendent"
      - "Production Superintendent"
    priority: "primary"

  coo:
    title_keywords:
      - "Chief Operating Officer"
      - "COO"
    priority: "primary"

  director_ops:
    title_keywords:
      - "Director of Operations"
      - "Director of Manufacturing"
      - "Director of Engineering"
      - "Director of Production"
      - "Director of Process Engineering"
    priority: "primary"

  digital_transformation:
    title_keywords:
      - "Digital Transformation"
      - "Industry 4.0"
      - "Smart Factory"
      - "Chief Digital Officer"
      - "IIoT"
    priority: "primary"

  # ============================================================
  # F&B FSMA 204 — Primary buyer personas
  # Contact 1: vp_ops / plant_manager (economic buyer — OEE + downtime)
  # Contact 2: vp_food_safety / regulatory_affairs_director (FSMA compliance)
  # Both targeted simultaneously for F&B companies
  # ============================================================
  vp_food_safety:
    title_keywords:
      - "VP Food Safety"
      - "Vice President Food Safety"
      - "VP Quality and Food Safety"
      - "Head of Food Safety"
      - "Chief Food Safety Officer"
      - "Director of Quality and Food Safety"
    priority: "primary_fb"

  regulatory_affairs_director:
    title_keywords:
      - "VP Regulatory Affairs"
      - "Vice President Regulatory Affairs"
      - "Director Regulatory Affairs"
      - "Director of Regulatory Affairs"
      - "Regulatory Affairs Manager"
      - "Regulatory Affairs Director"
    priority: "primary_fb"

  vp_quality_food_safety:
    title_keywords:
      - "VP Quality"
      - "Vice President Quality"
      - "VP Quality Assurance"
    priority: "primary_fb"

  director_quality_food_safety:
    title_keywords:
      - "Director of Quality"
      - "Director of Food Safety"
      - "Director Quality Assurance"
      - "Quality Assurance Director"
    priority: "primary_fb"

  compliance_manager_fb:
    title_keywords:
      - "Compliance Manager"
      - "Compliance Director"
      - "Director of Compliance"
      - "Food Safety Compliance Manager"
      - "FSMA Compliance Manager"
      - "Food Safety Manager"
    priority: "secondary_fb"

# Persona priority scores (see queue_manager.py for point values)
persona_priority:
  vp_ops: 100
  coo: 98
  maintenance_leader: 95
  plant_manager: 88
  director_ops: 80
  digital_transformation: 72
  vp_supply_chain: 60
  cio: 50
  # F&B FSMA 204 personas — elevated to co-primary (Contact 2 simultaneous)
  vp_food_safety: 85                  # primary F&B — FSMA decision maker
  regulatory_affairs_director: 78    # primary F&B — owns FDA relationship
  vp_quality_food_safety: 75         # primary F&B — elevated from 45
  director_quality_food_safety: 68   # primary F&B — elevated from 40
  compliance_manager_fb: 55          # secondary F&B

# Tier scoring (for queue_manager.py _TIER_POINTS)
# Primary mfg/pmfg tiers score higher than secondary fb tiers
tier_scoring:
  # Discrete manufacturing (primary)
  mfg1: 15   # Industrial Machinery
  mfg2: 14   # Metal Fabrication
  mfg3: 14   # Automotive
  mfg4: 12   # Electrical Equipment
  mfg5: 11   # Electronics
  mfg6: 13   # Aerospace
  mfg7: 12   # Primary Metals
  mfg8: 11   # Plastics & Rubber
  # Process manufacturing (primary)
  pmfg1: 14  # Chemical
  pmfg2: 13  # Oil & Gas
  pmfg3: 13  # Petroleum Refining
  pmfg4: 12  # Mining
  pmfg5: 11  # Utilities
  pmfg6: 13  # Pharma
  pmfg7: 10  # Paper & Pulp
  pmfg8: 10  # Non-Metallic Mineral
  # F&B FSMA 204 (co-primary — elevated from segment 3)
  fb_dairy:        12   # highest — HTST pasteurizer density, direct FTL (soft cheeses)
  fb_seafood:      12   # highest — finfish + crustaceans directly on FTL
  fb_produce:      12   # highest — leafy greens, peppers, sprouts on FTL
  fb_meat:         11   # high — strong FTL exposure, cold chain complexity
  fb_bev:          11   # high — aseptic filler OEE pain, $150K+/hr production value
  fb_food_general: 9    # medium — general 311; nut butters on FTL
  fb_bakery:       8    # medium — allergen changeover wedge; lower FTL exposure
  # Legacy tiers — retired but kept for backward compat with existing DB rows
  fb1: 6
  fb2: 5
  fb3: 4
  fb4: 4

# Discovery settings
discovery:
  max_results_per_run: 500
  pages_per_tier: 5
  default_campaign_name: "prospectiq_discovery"

  # ── Active discovery order ──────────────────────────────────────────────
  # Segment 1 (~45% of sends): Discrete manufacturing — clearest PdM ROI,
  #   shortest sales cycle.
  # Segment 2 (~30% of sends): F&B FSMA 204 — elevated to co-primary.
  #   FSMA enforcement is live (deadline passed Jan 20, 2026). FDA now in
  #   active enforcement mode. Two-touch cold outreach: VP Ops + VP Food Safety
  #   contacted simultaneously per company.
  # Segment 2 (~20% of sends): Process/chemical — regulatory overlay, slightly
  #   longer cycle.
  # Segment 4 (watchlist — NOT in tier_run_order):
  #   mfg6  (Aerospace)   — vendor qualification wall, long cycle
  #   pmfg2 (Oil & Gas)   — enterprise procurement, safety reg complexity
  #   pmfg5 (Utilities)   — regulated monopolies, govt procurement
  #   pmfg6 (Pharma)      — 21 CFR Part 11, vendor qualification wall
  #   campaign_cluster=watchlist, outreach_mode=manual for all segment 4
  tier_run_order:
    # Segment 1 — Discrete manufacturing (run first, highest volume)
    - "mfg1"          # Industrial Machinery & Heavy Equipment
    - "mfg2"          # Metal Fabrication & Precision Machining
    - "mfg3"          # Automotive Parts & Transportation Equipment
    - "mfg8"          # Plastics & Rubber Manufacturing
    - "mfg4"          # Electrical Equipment & Components
    - "mfg5"          # Electronics / Semiconductor
    # Segment 2 — F&B FSMA 204 (ELEVATED to co-primary — enforcement is live)
    - "fb_dairy"      # Dairy — HTST pasteurizers, soft cheeses on FTL
    - "fb_seafood"    # Seafood — finfish + crustaceans on FTL
    - "fb_produce"    # Produce/Fresh-Cut — leafy greens, peppers on FTL
    - "fb_meat"       # Meat & Poultry — strong FTL, cold chain
    - "fb_bev"        # Beverage — aseptic filler OEE pain
    - "fb_food_general"  # General food mfg (nut butters on FTL)
    - "fb_bakery"     # Bakery/Snack — allergen changeover wedge
    # Segment 2 — Process manufacturing
    - "pmfg1"         # Chemical Manufacturing
    - "mfg7"          # Primary Metals (steel, aluminum)
    - "pmfg3"         # Petroleum Refining & Coal Products
    - "pmfg4"         # Mining & Quarrying
    - "pmfg7"         # Paper & Pulp Manufacturing
    - "pmfg8"         # Non-Metallic Mineral Products (cement, glass, ceramics)
