# ProspectIQ — Ideal Customer Profile (ICP)
# Defines the target market filters for Apollo.io discovery
#
# STRATEGIC POSITIONING:
# Digitillis is manufacturing intelligence — predictive maintenance, OEE,
# anomaly detection, equipment health across ALL industrial sectors.
#
# PRIMARY: All discrete and process manufacturing — industrial machinery,
# automotive, aerospace, chemical, oil & gas, mining, plastics, metals,
# pharma, HVAC/pumps, utilities, paper, and more.
#
# SECONDARY: Food & Beverage — FSMA compliance as a door-opener, but not
# the core product value proposition.
#
# REVENUE TRANCHES (updated 2026-04-01):
#   T1: $100M–$400M  — fast pilots, build logos, VP can sign
#   T2: $400M–$1B    — bullseye (60% of outreach effort)
#   T3: $1B–$2B      — manual motion only, not cold email
#   watchlist        — pharma, aerospace, utilities — vendor qual wall
#
# Sweet spot: $100M–$2B revenue, 300–3,500 employees

version: "3.0"

target_market:
  name: "US Mid-Market Industrial Manufacturing — $100M–$2B Revenue"
  description: >
    Mid-market manufacturers across ALL industrial sectors (discrete and process),
    $100M–$2B revenue, 300–3,500 employees. Three tranches: T1 ($100M–$400M, fast pilots),
    T2 ($400M–$1B, bullseye), T3 ($1B–$2B, manual outreach only).
    Core value prop: prevent unplanned downtime, improve OEE, detect equipment
    anomalies before they become failures. F&B is secondary.

company_filters:
  industries:
    # ================================================================
    # PRIMARY VERTICAL — Discrete Manufacturing
    # NAICS 332–336, 339, 3364
    # Value prop: PdM, OEE, equipment health, anomaly detection
    # ================================================================
    - naics_prefix: "333"
      tier: "mfg1"
      label: "Industrial Machinery & Heavy Equipment"
      apollo_industry: "machinery"
      priority: "primary"
      segment: 1

    - naics_prefix: "332"
      tier: "mfg2"
      label: "Metal Fabrication & Precision Machining"
      apollo_industry: "fabricated metal products"
      priority: "primary"
      segment: 1

    - naics_prefix: "336"
      tier: "mfg3"
      label: "Automotive Parts & Transportation Equipment"
      apollo_industry: "automotive"
      priority: "primary"
      segment: 1

    - naics_prefix: "335"
      tier: "mfg4"
      label: "Electrical Equipment & Components"
      apollo_industry: "electrical/electronic manufacturing"
      priority: "primary"
      segment: 1

    - naics_prefix: "334"
      tier: "mfg5"
      label: "Computer & Electronic Manufacturing"
      apollo_industry: "semiconductors"
      priority: "primary"
      segment: 1

    - naics_prefix: "3364"
      tier: "mfg6"
      label: "Aerospace & Defense Manufacturing"
      apollo_industry: "aviation & aerospace"
      priority: "primary"
      segment: 4   # watch-list — vendor qualification wall, not in tier_run_order

    - naics_prefix: "331"
      tier: "mfg7"
      label: "Primary Metals — Steel, Aluminum, Foundry"
      apollo_industry: "metals"
      priority: "primary"
      segment: 2

    - naics_prefix: "326"
      tier: "mfg8"
      label: "Plastics & Rubber Manufacturing"
      apollo_industry: "plastics"
      priority: "primary"
      segment: 1

    # ================================================================
    # PRIMARY VERTICAL — Process Manufacturing
    # NAICS 211, 212, 221, 324, 325, 322, 3254
    # Value prop: asset reliability, process uptime, safety compliance
    # ================================================================
    - naics_prefix: "325"
      tier: "pmfg1"
      label: "Chemical Manufacturing"
      apollo_industry: "chemicals"
      priority: "primary"
      segment: 2

    - naics_prefix: "211"
      tier: "pmfg2"
      label: "Oil & Gas Extraction"
      apollo_industry: "oil & energy"
      priority: "primary"
      segment: 4   # watch-list — enterprise procurement, safety reg complexity

    - naics_prefix: "324"
      tier: "pmfg3"
      label: "Petroleum Refining & Coal Products"
      apollo_industry: "oil & energy"
      priority: "primary"
      segment: 2

    - naics_prefix: "212"
      tier: "pmfg4"
      label: "Mining & Quarrying"
      apollo_industry: "mining & metals"
      priority: "primary"
      segment: 2   # active but lower volume

    - naics_prefix: "221"
      tier: "pmfg5"
      label: "Utilities — Power Generation & Water"
      apollo_industry: "utilities"
      priority: "primary"
      segment: 4   # watch-list — regulated monopolies, govt procurement

    - naics_prefix: "3254"
      tier: "pmfg6"
      label: "Pharmaceutical & Biotech Manufacturing"
      apollo_industry: "pharmaceuticals"
      priority: "primary"
      segment: 4   # watch-list — 21 CFR Part 11, vendor qualification wall

    - naics_prefix: "322"
      tier: "pmfg7"
      label: "Paper & Pulp Manufacturing"
      apollo_industry: "paper & forest products"
      priority: "primary"
      segment: 2   # activated — large continuous-process plants, high downtime cost

    - naics_prefix: "327"
      tier: "pmfg8"
      label: "Non-Metallic Mineral Products — Cement, Glass, Ceramics"
      apollo_industry: "glass, ceramics & concrete"
      priority: "primary"
      segment: 2   # activated — kilns/crushers, 24/7 ops, expensive downtime

    # ================================================================
    # SECONDARY VERTICAL — Food & Beverage
    # NAICS 311–312
    # Door-opener: FSMA compliance urgency. Secondary GTM angle.
    # ================================================================
    - naics_prefix: "311"
      tier: "fb1"
      label: "Food Manufacturing"
      apollo_industry: "food production"
      priority: "secondary"
      segment: 3   # ops/uptime messaging — target VP Ops, Plant Manager only

    - naics_prefix: "312"
      tier: "fb2"
      label: "Beverage Manufacturing"
      apollo_industry: "food & beverages"
      priority: "secondary"
      segment: 3

    - naics_prefix: "3116"
      tier: "fb3"
      label: "Meat & Poultry Processing"
      apollo_industry: "food production"
      priority: "secondary"
      segment: 3

    - naics_prefix: "3115"
      tier: "fb4"
      label: "Dairy Product Manufacturing"
      apollo_industry: "dairy"
      priority: "secondary"
      segment: 3

  revenue:
    min: 100000000    # $100M minimum — below this, overhead too high to sell
    max: 2000000000   # $2B maximum — T3 cap; above $2B is Fortune 100 / different motion

  employee_count:
    min: 300
    max: 3500
    apollo_ranges:
      - "201,500"     # 201–500 employees (covers 300+ floor)
      - "501,1000"
      - "1001,2000"
      - "2001,5000"   # captures T3 upper bound (~3,500)

  geography:
    primary_states:
      # Manufacturing belt (highest density — highest priority)
      - "Ohio"
      - "Michigan"
      - "Indiana"
      - "Wisconsin"
      - "Illinois"
      - "Pennsylvania"
      - "Minnesota"
      - "Iowa"
      - "Missouri"
      - "Kentucky"
      # Secondary manufacturing + energy/mining corridors
      - "Texas"           # petrochemical, oil & gas
      - "Louisiana"       # refining, chemical
      - "North Carolina"
      - "Tennessee"
      - "Alabama"
      - "Georgia"
      - "South Carolina"
      - "Virginia"
      - "Kansas"
      - "Nebraska"
      - "Oklahoma"        # oil & gas
      - "Wyoming"         # mining
      - "Colorado"        # mining, aerospace
      - "West Virginia"   # chemical, mining
      # West Coast
      - "California"      # aerospace, electronics, pharma
      - "Oregon"
      - "Washington"
      - "Arizona"         # semiconductor, aerospace
      # Northeast
      - "New York"
      - "New Jersey"      # pharma, chemical
      - "Massachusetts"   # biotech, defense
      - "Connecticut"     # aerospace, defense
      - "Maryland"
    countries:
      - "United States"

  company_type:
    trading_status:
      - "private"
      - "public"

# Contact-level filters (titles to target in Apollo search)
contact_filters:
  titles:
    include:
      # ============================================================
      # PRIMARY — Operations & Maintenance
      # Core buyers for Digitillis across ALL manufacturing sectors
      # ============================================================
      - "VP Operations"
      - "Vice President Operations"
      - "VP Manufacturing"
      - "Vice President Manufacturing"
      - "VP Engineering"
      - "Vice President Engineering"
      - "Chief Operating Officer"
      - "COO"
      - "Plant Manager"
      - "Factory Manager"
      - "General Manager"
      - "Site Manager"
      - "Operations Manager"
      - "Manufacturing Manager"
      - "Production Manager"
      - "Director of Operations"
      - "Director of Manufacturing"
      - "Director of Engineering"
      - "Director of Production"
      # Maintenance & Reliability — high-urgency buyer in all sectors
      - "Director of Maintenance"
      - "VP Maintenance"
      - "Director of Reliability"
      - "Reliability Manager"
      - "Maintenance Manager"
      - "Director of Asset Management"
      - "VP Asset Management"
      # Process Manufacturing specific
      - "VP Refining"
      - "Director of Refining"
      - "Plant Superintendent"
      - "Production Superintendent"
      - "Process Engineering Manager"
      - "Director of Process Engineering"
      # Digital / Industry 4.0 — often owns the budget for IIoT
      - "VP Digital Transformation"
      - "Director of Digital Transformation"
      - "Director of Industry 4.0"
      - "Chief Digital Officer"
      # ============================================================
      # SECONDARY — F&B Quality/Compliance titles
      # Use only for F&B tier campaigns
      # ============================================================
      - "VP Quality"
      - "VP Food Safety"
      - "Director of Quality"
      - "Director of Food Safety"
      - "Director Quality Assurance"
      - "VP Quality Assurance"
    exclude:
      - "Marketing"
      - "Sales"
      - "HR"
      - "Human Resources"
      - "Legal"
      - "Finance"
      - "Accounting"
      - "IT Manager"
      - "Software Engineer"
      - "Product Manager"
      - "Business Development"

  seniority:
    - "vp"
    - "director"
    - "c_suite"
    - "manager"

# Persona classification (auto-applied to matched contacts)
persona_classification:
  # PRIMARY — core manufacturing buyers (all sectors)
  vp_ops:
    title_keywords:
      - "VP Operations"
      - "Vice President Operations"
      - "VP Manufacturing"
      - "Vice President Manufacturing"
      - "VP Engineering"
      - "Vice President Engineering"
      - "VP Refining"
      - "Vice President Refining"
    priority: "primary"

  maintenance_leader:
    title_keywords:
      - "Director of Maintenance"
      - "VP Maintenance"
      - "Maintenance Manager"
      - "Reliability Manager"
      - "Director of Reliability"
      - "Director of Asset Management"
      - "VP Asset Management"
    priority: "primary"

  plant_manager:
    title_keywords:
      - "Plant Manager"
      - "General Manager"
      - "Factory Manager"
      - "Site Manager"
      - "Operations Manager"
      - "Manufacturing Manager"
      - "Plant Superintendent"
      - "Production Superintendent"
    priority: "primary"

  coo:
    title_keywords:
      - "Chief Operating Officer"
      - "COO"
    priority: "primary"

  director_ops:
    title_keywords:
      - "Director of Operations"
      - "Director of Manufacturing"
      - "Director of Engineering"
      - "Director of Production"
      - "Director of Process Engineering"
    priority: "primary"

  digital_transformation:
    title_keywords:
      - "Digital Transformation"
      - "Industry 4.0"
      - "Smart Factory"
      - "Chief Digital Officer"
      - "IIoT"
    priority: "primary"

  # SECONDARY — F&B specific
  vp_quality_food_safety:
    title_keywords:
      - "VP Quality"
      - "VP Food Safety"
      - "Vice President Quality"
      - "Vice President Food Safety"
      - "VP Quality Assurance"
    priority: "secondary"

  director_quality_food_safety:
    title_keywords:
      - "Director of Quality"
      - "Director of Food Safety"
      - "Director Quality Assurance"
