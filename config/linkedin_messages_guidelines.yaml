# What to never include in LinkedIn DMs
never_include:
  - "Product pitches in connection notes or opening DMs"
  - "Multiple asks in a single message"
  - "Attachment links or PDF links"
  - "Urgency language"
  - "Competitor mentions"
  - "Fundraising or company stage information"
  - "Request for a demo in first contact"
  - "Automated-sounding openers"
  - "Em dashes or en dashes"
