# =========================================================
# DIGITILLIS PLATFORM CAPABILITIES (for outreach context)
# =========================================================
digitillis:
  tagline: "AI-Native Manufacturing Intelligence"
  core_capabilities:
    - "32 specialized AI agents across 7 manufacturing domains"
    - "Predictive maintenance with 18+ day advance warning"
    - "Anomaly detection with ensemble models across 100+ sensors"
    - "Quality control with defect prediction and SPC analytics"
    - "Energy and sustainability tracking with ESG reporting"
    - "Supply chain visibility with demand forecasting"
    - "Production optimization with OEE analytics"
    - "Conversational AI copilot (ARIA) for natural language queries"
  key_metrics:
    - "87% confidence in remaining useful life predictions"
    - "847ms average response time"
    - "18-day advance failure prediction"
    - "35+ production ML models"
  differentiators:
    - "Purpose-built for manufacturing (not adapted IT software)"
    - "Explainable AI — evidence packages on every prediction"
    - "Counterfactual ROI on every intervention"
    - "5-tier autonomy model (observe → auto-execute)"
    - "Multi-tenant, multi-site architecture"
  pilot_offer:
    duration: "6-8 weeks"
    commitment: "No long-term commitment required"
    deliverables:
      - "Full platform deployment on your data"
      - "Predictive maintenance models trained on your equipment"
      - "ROI analysis with quantified savings"
      - "Go/no-go decision based on results"
