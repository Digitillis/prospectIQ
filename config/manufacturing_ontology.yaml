# ProspectIQ — Manufacturing Domain Knowledge
# NAICS mapping, technology systems, competitors, value messaging, territories

version: "1.0"

# =========================================================
# NAICS CODE → SUB-SECTOR MAPPING
# =========================================================
naics_mapping:
  "331":
    label: "Primary Metal Manufacturing"
    sub_sectors: ["steel", "aluminum", "foundry", "forging"]
    common_equipment: ["furnace", "casting machine", "rolling mill", "forging press", "heat treatment"]
    tier: "2"
    digitillis_fit: "medium"

  "332":
    label: "Fabricated Metal Product Manufacturing"
    sub_sectors: ["stamping", "machining", "welding", "sheet metal", "spring", "valve", "tool & die"]
    common_equipment: ["CNC machining center", "press brake", "welding robot", "laser cutter", "punch press", "grinding machine"]
    tier: "2"
    digitillis_fit: "high"

  "333":
    label: "Machinery Manufacturing"
    sub_sectors: ["industrial machinery", "construction equipment", "HVAC", "turbines", "engines", "pumps", "compressors"]
    common_equipment: ["CNC", "assembly line", "testing equipment", "robotics", "paint booth", "inspection station"]
    tier: "1a"
    digitillis_fit: "very_high"

  "334":
    label: "Computer & Electronic Product Manufacturing"
    sub_sectors: ["semiconductor", "PCB assembly", "instruments", "sensors", "telecommunications"]
    common_equipment: ["SMT line", "pick and place", "reflow oven", "AOI", "test equipment", "clean room"]
    tier: "4"
    digitillis_fit: "high"

  "335":
    label: "Electrical Equipment Manufacturing"
    sub_sectors: ["motors", "generators", "transformers", "lighting", "batteries", "wiring"]
    common_equipment: ["winding machines", "assembly stations", "testing", "coating", "dipping"]
    tier: "2"
    digitillis_fit: "medium"

  "336":
    label: "Transportation Equipment Manufacturing"
    sub_sectors: ["automotive parts", "truck components", "powertrain", "chassis", "body parts", "interior"]
    common_equipment: ["CNC machining", "stamping press", "robotics", "painting line", "assembly line", "CMM"]
    tier: "1b"
    digitillis_fit: "very_high"

  "3364":
    label: "Aerospace Product & Parts Manufacturing"
    sub_sectors: ["aerostructures", "engine components", "avionics", "landing gear", "composites"]
    common_equipment: ["5-axis CNC", "composite layup", "NDT equipment", "CMM", "EDM", "autoclave"]
    tier: "5"
    digitillis_fit: "high"

  "326":
    label: "Plastics & Rubber Product Manufacturing"
    sub_sectors: ["injection molding", "extrusion", "blow molding", "thermoforming", "rubber"]
    common_equipment: ["injection molding machine", "extruder", "blow mold", "thermoformer", "robot", "conveyor"]
    tier: "3"
    digitillis_fit: "high"

