# =========================================================
# VALUE MESSAGING BY TIER
# =========================================================
value_messaging:
  "1a":  # Industrial Machinery
    primary_pains:
      - "Unplanned downtime on critical equipment costing $10K-100K+ per hour"
      - "Skilled maintenance workforce retiring, institutional knowledge leaving"
      - "Reactive maintenance consuming 60%+ of maintenance budget"
      - "Equipment complexity growing faster than team capability"
    value_hooks:
      - "Predict equipment failures 18+ days in advance with 87% confidence"
      - "Capture institutional maintenance knowledge in AI models that learn continuously"
      - "Shift from reactive to predictive maintenance, reducing costs by 25-40%"
      - "Quantify the financial ROI of every maintenance intervention"
    opener_angles:
      - "Industry trend: machinery OEMs losing $X to unplanned downtime"
      - "How peer companies are using AI to extend equipment life"

  "1b":  # Automotive Parts
    primary_pains:
      - "OEM quality requirements with zero-defect expectations"
      - "Just-in-time delivery pressure — zero room for unplanned downtime"
      - "Continuous cost reduction mandates from tier-1 customers"
      - "Traceability requirements growing with each audit"
    value_hooks:
      - "Detect quality deviations before defective parts are produced"
      - "Eliminate unplanned stops that disrupt JIT delivery commitments"
      - "Quantify ROI of every intervention to justify maintenance investments"
      - "Full production traceability across your operation"
    opener_angles:
      - "How automotive suppliers are meeting zero-defect mandates with AI"
      - "Reducing scrap rates in precision machining operations"

  "2":  # Metal Fabrication
    primary_pains:
      - "CNC machine utilization consistently below 65%"
      - "Tool wear causing quality drift mid-production run"
      - "High scrap rates on complex parts"
      - "Quote accuracy suffering from unpredictable machine performance"
    value_hooks:
      - "Optimize machine utilization with predictive scheduling"
      - "Detect tool wear in real-time before quality impact"
      - "Reduce scrap by predicting defect conditions before they occur"
      - "Data-driven insights for more accurate job quoting"
    opener_angles:
      - "Getting more from existing CNC capacity without new equipment"
      - "How precision shops are reducing scrap with predictive AI"

  "3":  # Plastics / Injection Molding
    primary_pains:
      - "Process parameter drift causing quality variation"
      - "Mold maintenance timing is guesswork"
      - "Energy costs rising with no visibility into consumption patterns"
      - "Color and dimension consistency across production runs"
    value_hooks:
      - "Monitor process parameters in real-time, predict quality deviations"
      - "Predict optimal mold maintenance timing based on actual wear patterns"
      - "Identify energy waste and optimize consumption per part"
    opener_angles:
      - "Reducing process variation in injection molding with AI"

  "4":  # Electronics Assembly
    primary_pains:
      - "First-pass yield rates need continuous improvement"
      - "SMT placement accuracy degradation over time"
      - "Reflow profile optimization is trial-and-error"
      - "Traceability demands from customers"
    value_hooks:
      - "Predict yield issues before they propagate through the line"
      - "Detect placement accuracy drift in real-time"
      - "Optimize process parameters based on continuous learning"
    opener_angles:
      - "How electronics manufacturers are improving first-pass yield with AI"

  "5":  # Aerospace Components
    primary_pains:
      - "AS9100 compliance overhead and documentation burden"
      - "NDT and inspection bottlenecks"
      - "Long-cycle-time machining on expensive materials — zero tolerance for scrap"
      - "Supply chain traceability requirements"
    value_hooks:
      - "Automated compliance documentation with evidence packages"
      - "Predict machining issues on high-value parts before material is wasted"
      - "Full audit trail with explainable AI decisions"
    opener_angles:
      - "Reducing scrap on high-value aerospace machining operations"

