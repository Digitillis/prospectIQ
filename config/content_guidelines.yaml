# =========================================================
# FORMAT TEMPLATES (detailed)
# =========================================================
format_templates:
  data_insight:
    display_name: "Data Insight"
    structure: |
      1. Hook: One specific stat or bold claim (first line)
      2. Context: 1-2 sentences on what the number means in practice
      3. Expansion: 3-5 short paragraphs or bullets developing the insight
      4. Implication: What this means for the reader's operation
      5. Close: Question or strong statement
    char_limit: 1300
    rules:
      - "Lead with the exact number. Never bury the stat."
      - "Source your data in the post or first comment"
      - "Mobile-friendly: short lines, white space between sections"

  framework:
    display_name: "Framework / Model"
    structure: |
      1. Hook: Name the framework in the first line
      2. Setup: Why this framework matters (1-2 sentences)
      3. Body: Text-based 2x2, maturity model, or decision tree
      4. Interpretation: Where most companies fall and why
      5. Close: "Where does your operation fall?" or strong statement
    char_limit: 1500
    rules:
      - "Give the framework a memorable name. Named frameworks get shared."
      - "Use text layout (renders well on mobile)"
      - "Mark where 'most companies' land to create identification"
      - "No more than 4 quadrants or 5 maturity levels"

  contrarian:
    display_name: "Contrarian Take"
    structure: |
      1. Hook: State the conventional wisdom being challenged
      2. Flip: Why it is wrong or incomplete
      3. Evidence: 2-4 data points or examples
      4. Better frame: The correct way to think about this
      5. Close: "Agree or disagree?" or strong closing
    char_limit: 1000
    rules:
      - "Position must be defensible, not just provocative"
      - "Pure text. No visual needed."
      - "Be specific about who is wrong and why"
      - "Short first line. The scroll-stop is the disagreement."

  benchmark:
    display_name: "Benchmark / Survey"
    structure: |
      1. Hook: "We analyzed X" or "Here is what the data shows"
      2. Findings: 4-6 numbered findings with specific numbers
      3. Surprise: Call out the most counterintuitive result
      4. Implications: What this means for manufacturers
      5. CTA: Invite DMs for the full analysis
    char_limit: 1500
    rules:
      - "Must cite the source data. No fabricated benchmarks."
      - "Call out one surprising finding explicitly"
      - "Use only when credible data is available (not scheduled weekly)"

