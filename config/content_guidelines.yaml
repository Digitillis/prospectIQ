# Format templates — 4 post formats with structure and rules
format_templates:
  data_insight:
    display_name: "Data Insight"
    frequency: "2x/week"
    structure: |
      1. Hook: One specific stat or bold claim (first line — make it impossible to scroll past)
      2. Context: 1-2 sentences explaining what the number means in practice
      3. "So what?": 3-5 bullet points or short paragraphs expanding the insight
      4. Implication: 1-2 sentences on what this means for the reader's operation
      5. Question: End with a genuine question to invite comments
    char_limit: 1300
    rules:
      - "Lead with the exact number — never bury the stat"
      - "Bullet points are fine — use them for lists of 3 or more items"
      - "Source your data in the post or as a comment (never make up stats)"
      - "No stock imagery references — use a stat card visual"
      - "Mobile-friendly: short lines, white space between sections"

  framework:
    display_name: "Framework / Model"
    frequency: "1x/week"
    structure: |
      1. Hook: Name the framework or problem it solves in the first line
      2. Setup: 1-2 sentences on why this framework matters
      3. Framework body: Text-based 2x2, maturity model, or decision tree
      4. Interpretation: Where most companies fall and why
      5. Question: "Where does your operation fall?"
    char_limit: 1500
    rules:
      - "Give the framework a memorable name — people share and screenshot named frameworks"
      - "Use ASCII art or text layout for the matrix/model (renders well in LinkedIn)"
      - "Explicitly mark where 'most companies' land to create identification"
      - "Keep the framework actionable — a reader should know what to do with it"
      - "No more than 4 quadrants or 5 maturity levels"

  contrarian:
    display_name: "Contrarian Take"
    frequency: "1x/week"
    structure: |
      1. Hook: State the conventional wisdom being challenged (first line)
      2. Flip: Explain clearly why it is wrong or incomplete
      3. Evidence: 2-4 specific examples or data points backing the contrarian view
      4. Better frame: Provide the correct way to think about this
      5. Question: "Agree or disagree?"
    char_limit: 1000
    rules:
      - "The contrarian position must be defensible — not just provocative"
      - "No text visual needed — contrarian posts perform better as pure text"
      - "Be specific about who is wrong and why (not vague 'some people think')"
      - "The payoff must be genuinely useful, not just a hot take"
      - "Short first line — the scroll-stopping moment is the disagreement"

  benchmark:
    display_name: "Benchmark / Survey"
    frequency: "1x/month"
    structure: |
      1. Hook: "We analyzed X" or "Here's what the data shows" — set up the study
      2. Top findings: 4-6 numbered findings with specific percentages or numbers
      3. Surprising finding: Call out the most counterintuitive result explicitly
      4. Implications: 2-3 sentences on what this means for mid-market manufacturers
      5. CTA: Invite DMs or comments for the full data
    char_limit: 1500
    rules:
      - "The 'we analyzed' framing builds credibility — use it"
      - "Call out one 'surprising finding' explicitly — it drives shares"
      - "Pair with a carousel of 3-5 chart images"
      - "Must cite the source data — no fabricated benchmarks"
      - "Offer to share the full analysis via DM to drive inbound conversations"

# Quality standards — non-negotiable for every post
quality_standards:
  - "Lead with a specific number, data point, or bold claim — never a soft opener"
  - "Be factually accurate and sourceable — no invented statistics"
  - "Provide genuine value a reader can use today — not just observations"
  - "End with a question that invites real comments"
  - "Readable on mobile: short paragraphs, generous line breaks"
  - "Must not exceed 1500 characters — LinkedIn truncates at ~1300"
  - "Every visual must be clean and professional (McKinsey presentation quality)"
  - "Every visual must include data source attribution in small text"

# Banned phrases — content validator checks for these
banned_phrases:
  # AI tells
  - "moreover"
  - "furthermore"
  - "it's worth noting"
  - "needless to say"
  - "at the end of the day"
  - "in today's landscape"
  - "in today's fast-paced"
  - "in today's world"
  - "it is important to note"
  - "I wanted to share"
  - "I'm excited to share"
  - "excited to announce"
  - "I'm thrilled"
  - "thrilled to share"
  # LinkedIn cliches
  - "thought leader"
  - "thought leadership"
  - "game-changer"
  - "game changing"
  - "disrupting"
  - "disruptive"
  - "innovative"
  - "cutting-edge"
  - "state-of-the-art"
  - "best-in-class"
  - "revolutionary"
  - "synergy"
  - "leverage"
  - "paradigm"
  - "circle back"
  - "move the needle"
  - "low-hanging fruit"
  - "boil the ocean"
  - "deep dive"
  # From outreach (also banned in posts)
  - "I hope this finds you well"
  - "just wanted to reach out"
  - "touching base"
  - "leading provider"
  - "we help companies like"
  - "our platform offers"
  - "our solution provides"

# What to never include in thought leadership posts
never_include:
  - "Any mention of Digitillis, the platform, or any product"
  - "Any mention of AI tools, AI platforms, or specific vendors"
  - "Hashtags of any kind (reduces LinkedIn organic reach in 2026)"
  - "Stock imagery or clip art references"
  - "Self-promotional language ('we just launched', 'proud to announce')"
  - "Multiple exclamation points"
  - "Em dashes or en dashes"
  - "Jargon without explanation (if you use it, define it)"
  - "Unverified or made-up statistics"
  - "Urgency language ('act now', 'don't miss this')"

# What must be included in thought leadership posts
must_include:
  - "A specific, sourceable data point or benchmark"
  - "Attribution for data sources (either inline or in first comment)"
  - "A genuine question at the end to invite comments"
  - "Mobile-friendly line breaks throughout"

# Visual style guide
visual_style:
  colors:
    primary: "#1e293b"    # dark navy
    accent: "#3b82f6"     # Digitillis blue
    background: "#ffffff" # always white or light gray
    secondary_bg: "#f8fafc"
  fonts:
    primary: "Inter"
    fallback: "system-ui, sans-serif"
    code: "JetBrains Mono, monospace"
  dimensions:
    stat_card: "1200x627"
    square: "1080x1080"
    carousel_slide: "1200x627"
  rules:
    - "Maximum 2 colors (navy + accent blue) — never more"
    - "White or light gray backgrounds — never dark backgrounds for data visuals"
    - "Clean, minimal, professional — no gradients, no drop shadows on data"
    - "Data always sourced: small attribution text in bottom-left or bottom-right"
    - "No Digitillis logo or company branding on visuals — author name only"
    - "No stock photos or clip art"
  visual_types:
    - name: "stat_card"
      description: "Single large number + context line + source. Clean white card."
    - name: "two_by_two_matrix"
      description: "Named quadrants, thin grid lines, dot showing where most companies are."
    - name: "maturity_model"
      description: "4-5 horizontal levels, labeled, with indicator of typical position."
    - name: "bar_chart"
      description: "Max 5 bars. Clear labels. No 3D effects. Source noted."
    - name: "carousel"
      description: "3-5 slides, consistent template, title + insight + visual per slide."

