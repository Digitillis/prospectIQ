# ProspectIQ — Engagement Sequence Definitions
# Single-channel sequences only. Channels are NEVER blended in a single sequence.
# Each sequence is one channel end-to-end.

version: "2.0"

sequences:
  # =========================================================
  # SEQUENCE 1: LinkedIn Relationship Builder
  # Primary for VP/C-suite contacts with a LinkedIn URL.
  # 5 steps, LinkedIn-only.
  # =========================================================
  linkedin_relationship:
    name: "LinkedIn Relationship Builder"
    description: "5-step LinkedIn-only sequence. Each step builds on the previous."
    channel: linkedin
    timing_jitter_days: 2  # +-2 days randomization to feel natural
    steps:
      - step: 1
        name: recognition
        type: linkedin_connection
        delay_days: 0
        instructions:
          description: >
            Connection note that demonstrates you know who they are and what their
            company does. Reference ONE specific fact (sub-sector, recent expansion,
            specific product line). Zero pitch. Max 50 words.
          tone: "Peer introducing themselves. Not a vendor."
          max_words: 50
          anti_patterns:
            - "No product mention"
            - "No 'I'd love to connect'"
            - "No generic opener -- must reference one specific company fact"

      - step: 2
        name: curiosity
        type: linkedin_dm
        delay_days: 3
        wait_for: connection_accepted
        instructions:
          description: >
            Ask a genuine question about their specific operational challenge.
            The question itself should demonstrate domain expertise. For F&B:
            ask about CCP documentation, audit prep, or traceability gaps.
            For Mfg: ask about their maintenance approach, unplanned downtime
            patterns, or how they prioritize work orders. No product mention.
          tone: "Curious peer. Like asking a colleague at a conference."
          max_words: 80
          anti_patterns:
            - "No product or Digitillis mention"
            - "No leading questions designed only to surface a pain point"
            - "Must be a question only someone with domain knowledge would ask"

      - step: 3
        name: value_share
        type: linkedin_dm
        delay_days: 7
        instructions:
          description: >
            Share a specific insight, data point, or framework relevant to their
            situation. This should be genuinely useful -- something they'd screenshot
            or forward to a colleague. Reference an industry report, benchmark,
            or regulatory update. Still no product pitch.
          tone: "Thought leader sharing something useful. Like a mini-article."
          max_words: 100
          anti_patterns:
            - "No direct product pitch"
            - "Insight must be specific to their sub-sector, not generic 'manufacturing'"
            - "Must be standalone value even if they never respond"

      - step: 4
        name: relevance
        type: linkedin_dm
        delay_days: 10
        instructions:
          description: >
            Connect the dots between their challenge (from step 2 response or
            your research) and how companies in their sub-sector are solving it.
            Can mention 'what I'm working on' in passing but frame it as context,
            not a pitch. The focus stays on THEIR problem.
          tone: "Advisor, not seller. Like a consultant who happens to be building something."
          max_words: 120
          anti_patterns:
            - "Focus must stay on their problem, not Digitillis features"
            - "Product mention is context only, not a sales pitch"
            - "Do not lead with Digitillis"

      - step: 5
        name: soft_ask
        type: linkedin_dm
        delay_days: 14
        instructions:
          description: >
            Direct but respectful ask. Offer something specific and valuable:
            a free readiness assessment, a custom ROI estimate based on their
            equipment profile, or a 15-minute walkthrough of how similar plants
            handle this. Make it easy to say yes or no.
          tone: "Direct, respectful. Easy to say yes or no."
          max_words: 100
          anti_patterns:
            - "No urgency language"
            - "No guilt or 'just following up'"
            - "Offer must be specific and low-friction"

  # =========================================================
  # SEQUENCE 2: Email Value-First
  # For contacts without LinkedIn, or after LinkedIn fails.
  # 4 steps, email-only.
  # =========================================================
  email_value_first:
    name: "Email Value-First Sequence"
    description: "4-step email-only sequence. Lead with value, not pitch."
    channel: email
    timing_jitter_days: 1
    steps:
      - step: 1
        name: value_insight
        type: initial_value_prop
        delay_days: 0
        instructions:
          subject_approach: "Reference their sub-sector or a specific operational context, not just their company name"
          description: >
            Lead with a specific, actionable insight about their sub-sector.
            Not 'I noticed your company...' but rather share a data point or
            trend that affects their specific operation. Then briefly connect
            it to what you're building. End with a low-friction question, not
            a meeting request.
          tone: "Expert sharing something useful. The email should be worth reading even if they never respond."
          max_words: 80
          anti_patterns:
            - "Do not open with 'I noticed your company...'"
            - "No meeting request in step 1 -- end with a question"
            - "Insight must be sub-sector specific, not generic"
            - "No feature lists"
            - "Opening sentence MUST use one of the PERSONALIZATION HOOKS directly -- not a generic sub-sector trend. The hook goes first, not in the middle."
            - "Do not soften the hook with a preamble. Wrong: 'In talking to companies like yours, I noticed that Plex users often...' Right: 'MEC runs Plex -- most Plex shops still track work orders in Excel.'"

      - step: 2
        name: case_relevance
        type: follow_up_insight
        delay_days: 5
        instructions:
          subject_approach: "Reference a specific outcome or equipment type relevant to their operation"
          description: >
            Describe how a similar company in their sub-sector addressed the
            challenge you mentioned in email 1. Use real training data results
            (18-day RUL prediction, 87% confidence, 25-40% maintenance cost
            reduction). Do not fabricate case studies. Be specific about the
            type of equipment and the outcome.
          tone: "Evidence-based. Specific. Not a generic case study."
          max_words: 100
          anti_patterns:
            - "No fabricated case studies -- use real platform capabilities as examples"
            - "Equipment type and outcome must be specific, not generic"

      - step: 3
        name: framework_share
        type: follow_up_insight
        delay_days: 8
        instructions:
          subject_approach: "Frame around a practical framework or question they can use immediately"
          description: >
            Share a simple framework or assessment they can use immediately.
            For F&B: '3 questions to assess your FSMA audit readiness.'
            For Mfg: 'The maintenance maturity spectrum -- where does your
            plant fall?' This demonstrates expertise and provides standalone value.
          tone: "Consultant sharing a tool. The framework should be genuinely useful."
          max_words: 100
          anti_patterns:
            - "Framework must be actionable on its own, not a hook to get a call"
            - "No urgency or scarcity language"

      - step: 4
        name: direct_ask
        type: soft_close
        delay_days: 12
        instructions:
          subject_approach: "Direct and specific -- what you're offering, not a vague 'following up'"
          description: >
            Direct, respectful close. Acknowledge they're busy. Offer something
            specific: a free readiness assessment, a custom ROI estimate, or a
            15-minute demo tailored to their equipment type. Make it binary --
            easy to say yes or no. No guilt. No 'just following up.'
          tone: "Direct, respectful of their time. Binary ask."
          max_words: 60
          anti_patterns:
            - "No 'just following up' or 'circling back'"
            - "No guilt or manufactured urgency"
            - "Ask must be a single binary offer"

  # =========================================================
  # SEQUENCE 3: LinkedIn-to-Email Fallback
  # Triggered after 14 days of LinkedIn silence.
  # Fresh angle -- do NOT reference LinkedIn.
  # 3 steps, email-only.
  # =========================================================
  linkedin_to_email_fallback:
    name: "LinkedIn to Email Fallback"
    description: "Triggered after 14 days of LinkedIn silence. Different angle than LinkedIn."
    channel: email
    trigger: linkedin_silent_14_days
    timing_jitter_days: 2
    steps:
      - step: 1
        name: fresh_angle
        type: initial_value_prop
        delay_days: 0
        instructions:
          subject_approach: "Reference a different angle than what was used on LinkedIn -- if LinkedIn was compliance, email about cost; if LinkedIn was maintenance, email about quality"
          description: >
            Do NOT reference LinkedIn. Start completely fresh with a different
            angle than whatever was used on LinkedIn. If LinkedIn was about
            compliance, email about cost reduction. If LinkedIn was about
            maintenance, email about quality. New angle, new value prop.
          tone: "Fresh introduction. As if LinkedIn never happened."
          max_words: 80
          anti_patterns:
            - "Do not reference LinkedIn or prior contact"
            - "Must use a genuinely different angle than whatever LinkedIn sequence used"
            - "No 'I tried reaching out on LinkedIn'"

      - step: 2
        name: evidence
        type: follow_up_insight
        delay_days: 5
        instructions:
          subject_approach: "Reference specific data or outcome relevant to the new angle"
          description: >
            Follow up with evidence supporting the new angle. Specific data,
            specific outcomes, specific equipment types.
          tone: "Evidence-based follow-up."
          max_words: 100
          anti_patterns:
            - "Evidence must match the new angle, not drift back to the LinkedIn angle"
            - "Specific equipment type and outcome required -- no vague claims"

      - step: 3
        name: final_ask
        type: soft_close
        delay_days: 10
        instructions:
          subject_approach: "Specific offer -- state exactly what you're proposing"
          description: >
            Final touch. Direct ask with a specific offer. If no response,
            the prospect goes to re-engagement queue (90-day cooldown).
          tone: "Last touch. Respectful. No desperation."
          max_words: 60
          anti_patterns:
            - "No guilt or desperation"
            - "No 'last chance' or urgency language"
            - "If they don't respond, that's a valid answer"

  # =========================================================
  # SEQUENCE 4: Story-Driven Follow-up (Brunson Arc)
  # Use after email_value_first completes with no reply,
  # or as an alternative cold sequence for story-receptive personas.
  # Follows: Problem → Villain → Solution → Proof → CTA
  # 5 steps, email-only.
  # =========================================================
  email_story_followup:
    name: "Story-Driven Follow-up (Brunson Arc)"
    description: "5-step email sequence using Problem → Villain → Solution → Proof → CTA storytelling structure."
    channel: email
    timing_jitter_days: 1
    steps:
      - step: 1
        name: the_problem
        type: initial_value_prop
        delay_days: 0
        instructions:
          subject_approach: "Name the specific problem they're likely living with — use their sub-sector and equipment type"
          description: >
            Open with a vivid description of the exact operational problem this
            company is likely experiencing. Not a generic pain point — the specific
            version of it for their sub-sector and scale. Use data to make it real:
            "A $300M automotive stamping plant running predictive maintenance on gut
            feel is generating roughly $1.2M in avoidable downtime per year."
            Do NOT pitch a solution. End with one empathy question.
          tone: "Operator who's seen this problem firsthand. Grounded, not dramatic."
          max_words: 100
          anti_patterns:
            - "Do not pitch a solution — the problem is the entire email"
            - "The problem must be specific to THIS company's sub-sector and operation"
            - "No leading with Digitillis or AI"
            - "Use data, not emotion ('significant downtime' → '$X per event')"

      - step: 2
        name: the_villain
        type: follow_up_insight
        delay_days: 4
        instructions:
          subject_approach: "Name the villain — the root cause they've accepted as normal"
          description: >
            Identify the villain: the systemic reason the problem persists despite
            the team knowing about it. This is NOT a competitor — it's the structural
            cause. For maintenance: "The villain is reactive scheduling — it's not
            that maintenance teams don't care, it's that your CMMS was designed for
            tracking repairs, not predicting them." For F&B: "The villain is that
            HACCP plans are built for audits, not operations." Name it. Validate them.
            Show you understand why it's hard. No solution yet.
          tone: "Empathetic industry analyst. Not finger-pointing — exonerating."
          max_words: 100
          anti_patterns:
            - "The villain is a structural/systemic cause — never a competitor or person"
            - "Do NOT hint at your solution"
            - "Validate that the villain is not their fault"

      - step: 3
        name: the_solution
        type: follow_up_insight
        delay_days: 8
        instructions:
          subject_approach: "Frame the category shift, not the product — 'A different approach to X'"
          description: >
            Introduce the category of solution — not Digitillis specifically, but
            the approach that solves this. "The shift from reactive tracking to
            predictive modeling changes the ROI math entirely. Instead of logging
            failures, you're catching the 72-hour warning window before they happen."
            Connect the solution category to the villain from email 2.
            Mention Digitillis briefly and naturally in one sentence.
          tone: "Thought leader describing a category shift. Not a product pitch."
          max_words: 120
          anti_patterns:
            - "Digitillis gets one sentence maximum"
            - "Frame the solution category, not features"
            - "Must connect back to the villain from email 2"

      - step: 4
        name: the_proof
        type: follow_up_insight
        delay_days: 12
        instructions:
          subject_approach: "A specific outcome — a number, a timeline, a before/after"
          description: >
            One concrete proof point that the solution works. Use Digitillis
            real capabilities as examples: 18-day advance warning on bearing
            failures, 87% prediction confidence, 25-40% maintenance cost
            reduction. Frame as a story about a comparable operation (no names):
            "A food & beverage plant in the Midwest was averaging 3 unplanned
            CIP line shutdowns per quarter. 90 days after deploying sensor
            monitoring, that dropped to 0." Specific. Believable. Verifiable.
          tone: "Evidence-based. The numbers do the work, not adjectives."
          max_words: 100
          anti_patterns:
            - "No fabricated case studies — use real Digitillis capabilities"
            - "The comparison plant must be genuinely similar to this prospect"
            - "Numbers are mandatory — no vague 'significant improvement'"

      - step: 5
        name: the_cta
        type: soft_close
        delay_days: 16
        instructions:
          subject_approach: "A specific, bounded offer — name exactly what you're proposing"
          description: >
            Tie the full arc together in 2-3 sentences: you named the problem,
            identified why it persists, and showed one path through it. Now make
            a single, bounded ask: the 6-8 week pilot. "We run 6-8 week pilots
            with one equipment class. No long-term commitment. If it doesn't work,
            we part as friends." One binary question to close.
          tone: "Confident, respectful, easy to say yes or no."
          max_words: 80
          anti_patterns:
            - "No urgency or scarcity language"
            - "No guilt or 'last chance'"
            - "The ask must be binary — one clear yes/no offer"
            - "Don't re-pitch everything — trust the arc to have done the work"

  # =========================================================
  # WARM FOLLOW-UP: For prospects who engaged but didn't reply
  # Email-only.
  # =========================================================
  warm_follow_up:
    name: "Warm Follow-up — Post Engagement"
    description: "For prospects who showed engagement signals (opens/clicks) but didn't reply."
    channel: email
    total_steps: 2
    steps:
      - step: 1
        channel: email
        delay_days: 0
        template: "engagement_acknowledgment"
        instructions:
          description: >
            Do not mention that you know they opened (feels creepy).
            Instead, add new value -- a fresh insight, a relevant
            development in their industry, or a more specific use case.
          max_words: 120

      - step: 2
        channel: email
        delay_days: 7
        template: "final_value_offer"
        instructions:
          description: >
            Clear, specific offer: 'We're running 6-8 week pilot programs
            with select manufacturers. No commitment beyond the pilot.
            Would this be worth exploring?' Make it easy to decline gracefully.
          max_words: 100

  # =========================================================
  # REPLY HANDLING: Positive reply next steps
  # Email-only.
  # =========================================================
  reply_positive:
    name: "Positive Reply — Next Steps"
    description: "When a prospect expresses interest."
    channel: email
    total_steps: 2
    steps:
      - step: 1
        channel: email
        delay_days: 0
        template: "meeting_booking"
        instructions:
          description: >
            Acknowledge their interest warmly. Propose 2-3 specific meeting
            times in the next week. Keep it brief.
          max_words: 80

      - step: 2
        channel: email
        delay_days: 3
        template: "meeting_reminder"
        instructions:
          description: >
            Gentle follow-up if no response to meeting proposal.
            Offer alternative times or async demo option.
          max_words: 60


# =========================================================
# GLOBAL OUTREACH PRINCIPLES (included in every prompt)
# =========================================================
global_principles:
  voice:
    - "Write as Avi -- a technical founder who understands manufacturing, not a salesperson"
    - "Direct, confident, conversational. Short sentences. No corporate jargon."
    - "Show genuine curiosity about their operation -- ask smart questions"
    - "Use their industry language naturally (OEE, MTBF, RUL, CCP, HACCP, FSMA)"
    - "Be specific, not generic. Reference their actual situation from research."
    - "One email = one idea. Don't cram multiple points into one message."
  anti_patterns:
    - "Never use 'I hope this finds you well' or any filler opener"
    - "Never create false urgency or scarcity"
    - "Never make claims without evidence or numbers"
    - "Never use manipulative sales language"
    - "Never send walls of text -- respect their time (under 150 words)"
    - "Never attach files in initial outreach"
    - "Never use feature lists or bullet points of capabilities"
    - "Never use words: leverage, synergy, cutting-edge, game-changing, revolutionary"
    - "Never compliment their company in a way that feels like flattery"
    - "Never mention Digitillis funding, stage, or team size"
  personalization_requirements:
    - "Every email must reference at least 1 specific fact about the company"
    - "Subject lines must reference their company name or specific situation"
    - "CTA must be a single, low-friction ask (15-min call, not a demo)"
  signature: |
    Best regards,
    Avanish

    Avanish Mehrotra
    Founder & CEO
    Digitillis | www.digitillis.com
    avi@digitillis.io | 224.355.4500

# ---------------------------------------------------------------------------
# Cross-channel orchestration rules
# Determines which sequence to start based on contact attributes.
# The pipeline orchestrator reads these to auto-assign sequences.
# ---------------------------------------------------------------------------
channel_orchestration:
  # Decision logic (evaluated top-to-bottom, first match wins)
  rules:
    - name: "linkedin_first"
      condition: "contact has linkedin_url AND contact is VP/C-suite"
      sequence: "linkedin_relationship"
      rationale: "LinkedIn relationship building is highest-converting for senior personas"

    - name: "email_only"
      condition: "contact has email AND no linkedin_url"
      sequence: "email_value_first"
      rationale: "Default email sequence when LinkedIn is unavailable"

    - name: "linkedin_with_email_fallback"
      condition: "contact has both linkedin_url and email"
      primary_sequence: "linkedin_relationship"
      fallback_sequence: "linkedin_to_email_fallback"
      fallback_trigger_days: 14
      rationale: "Start on LinkedIn; if silent after 14 days, switch to email with fresh angle"

    - name: "story_arc_reengagement"
      condition: "email_value_first completed with no reply AND PQS >= 50"
      sequence: "email_story_followup"
      rationale: "High-PQS prospects that didn't respond to value-first get the story arc"

  # Persona-to-sequence affinity overrides
  persona_overrides:
    coo: "linkedin_relationship"
    vp_ops: "linkedin_relationship"
    plant_manager: "email_value_first"
    maintenance_leader: "email_value_first"
    digital_transformation: "email_story_followup"
    vp_quality_food_safety: "linkedin_relationship"

  # Cooldown between sequence completions (days before next sequence starts)
  inter_sequence_cooldown_days: 7

# ---------------------------------------------------------------------------
# LinkedIn Automation — Unipile configuration
# ---------------------------------------------------------------------------
linkedin_automation:
  # Set to true to enable automated sending via Unipile.
  # When false, the LinkedIn page remains copy-paste manual (safe default).
  auto_send_enabled: false

  # Per-workspace override: operators can toggle from Settings → LinkedIn tab
  # This global setting acts as a master switch; workspace setting gates further.

  # Daily limits (LinkedIn soft limits — do not exceed)
  daily_connection_request_limit: 20
  daily_dm_limit: 50

  # Automatically withdraw pending connection invites older than this many days.
  # Keeps pending invite count below LinkedIn's ~400 limit.
  stale_invite_withdraw_days: 21

  # Delay (in hours) after connection accepted before opening DM is eligible.
  # Gives the prospect time to see the connection before receiving a message.
  dm_delay_after_acceptance_hours: 24

  # HITL mode: when true, every automated send still requires a final approval
  # click in the UI. Reduces risk during initial rollout.
  require_hitl_approval: true

  # Scheduler: how often to run the LinkedIn sender agent (minutes)
  # Set to 0 to disable scheduled runs (manual trigger only via /run/linkedin-send)
  scheduler_interval_minutes: 0

# ---------------------------------------------------------------------------
# Reply Strategy Variants (2.10)
# Named strategies selected by the reply classifier based on reply type.
# ---------------------------------------------------------------------------
reply_strategies:

  # Positive reply — prospect wants to know more or book a call
  positive_reply:
    strategy: "transition_to_call"
    instructions: >
      Acknowledge their interest warmly but concisely. Don't oversell — they're
      already interested. Propose 2-3 specific calendar slots in the next 5 business
      days. Offer to send a calendar link. Reference ONE specific thing you'll show
      them based on what they mentioned. Sign as Avanish. Under 80 words.
    anti_patterns:
      - "No 'great to hear from you' filler"
      - "No over-enthusiasm or exclamation marks"
      - "Propose SPECIFIC times, not 'what works for you?'"
      - "Do not add new value props — they're interested, just confirm the call"

  # "Tell me more" reply — prospect is curious but hasn't committed
  tell_me_more:
    strategy: "3_variants"
    variants:
      concise:
        description: "One paragraph — the key outcome for their specific operation"
        max_words: 60
        instructions: >
          Answer the implied question in one paragraph. Focus on the outcome most
          relevant to what they do (not a feature list). End with a binary CTA:
          "Worth a 20-minute call to see if this applies to you?"
      story:
        description: "A specific manufacturer story — similar company, specific outcome"
        max_words: 100
        instructions: >
          Tell a brief story about a similar manufacturer (no names — 'a food & beverage
          plant in the Midwest'). Problem they had → what changed → specific outcome.
          Keep it factual. End with: "Does this resonate with what you're dealing with?"
      flip_the_question:
        description: "Ask a clarifying question that advances the sale"
        max_words: 50
        instructions: >
          Instead of answering, ask ONE question that will help you give them a better
          answer AND advance the conversation. E.g.: 'Before I send more — what's your
          biggest maintenance headache right now?' Short, direct, no preamble.

  # No-reply bump — prospect hasn't responded, adding new value
  no_reply_bump:
    strategy: "new_value_not_bump"
    instructions: >
      Do NOT write 'just following up' or 'circling back.' Instead, add genuine new
      value: a data point they haven't seen, a regulatory update that affects their
      specific operation, or a framework they can use today. The email should be worth
      reading even if they never respond. Subtle callback to the previous email is OK
      ('Last week I mentioned...') but the value in THIS email must stand alone.
    anti_patterns:
      - "No 'following up' or 'bumping this'"
      - "No 'did you have a chance to read my last email'"
      - "New value must be specific to their sub-sector, not generic"

  # Objection handling — prospect raises a concern
  objection:
    strategies:
      incumbent_vendor:
        instructions: >
          Acknowledge their current vendor — don't attack it. Ask ONE specific question
          about a gap you suspect: 'Does [vendor] give you [specific capability]?'
          Don't pitch Digitillis directly. Make them articulate the gap themselves.
      budget:
        instructions: >
          Reframe around ROI: 'What's one unplanned stop costing you per day?'
          Then briefly mention that for most plants we work with, one avoided event
          pays for a full year. Offer a no-cost data readiness assessment so they
          can make the case internally. Under 60 words.
      timing:
        instructions: >
          Agree with them — respect the constraint. Offer to send a single-page
          summary they can file for when the timing is right. Ask if it's OK to
          check in in 60 days. Make it easy for them to park this without losing
          the relationship. Under 50 words.
      not_the_right_person:
        instructions: >
          Thank them for the clarification. Ask: 'Who should I be talking to about
          [specific operational challenge]?' One sentence. Don't over-explain.
