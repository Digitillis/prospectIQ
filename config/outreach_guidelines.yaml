# ProspectIQ — Outreach Guidelines
# Edit these from the dashboard at /settings → Outreach Guidelines tab
# The outreach agent injects these into every Claude prompt
# Last updated: 2026-03-21

version: "1.0"

# Who is sending the emails
sender:
  name: "Avanish Mehrotra"
  short_name: "Avanish"
  title: "Founder & CEO"
  company: "Digitillis"
  email: "avi@digitillis.com"
  phone: "224.355.4500"
  website: "www.digitillis.com"
  signature: |
    Best regards,
    Avanish

    Avanish Mehrotra
    Founder & CEO
    Digitillis | www.digitillis.com
    avi@digitillis.com | 224.355.4500

# Voice and tone instructions — injected into every outreach prompt
voice_and_tone: |
  Write as Avanish (Avi) Mehrotra, a technical founder who deeply understands
  manufacturing operations. Direct, confident, conversational. Short sentences.
  No corporate jargon. No buzzwords.

  Show genuine curiosity about their specific operation. Ask smart questions
  that demonstrate domain knowledge. Never name-drop or brag. Let the value
  speak for itself.

  Use contractions naturally (don't, we're, I'm, you're). Real people use
  contractions. Vary sentence length. Mix short punchy sentences with slightly
  longer ones. Start some sentences with "And" or "But".

  The email should sound like it was written by a real person, not generated
  by AI. Read it aloud in your head. If it sounds robotic, rewrite it.

# Email structure — every email must follow this order
email_structure: |
  1. Opening: One line referencing something specific about THEIR company (not about Digitillis)
  2. Bridge: 1-2 sentences connecting their situation to a relevant problem/opportunity
  3. Value: One concrete, specific claim about what Digitillis does (with a number if possible)
  4. CTA: Single low-friction ask (15-min call, not a demo or commitment)
  5. Sign-off: Always use the exact signature block from the sender config

# What to include in every email
must_include:
  - "At least one specific fact about their company from the research"
  - "A relevant industry data point or pain point"
  - "One clear, measurable Digitillis capability"
  - "A single, easy call-to-action"

# What to never include
never_include:
  - "'I hope this finds you well' or any filler opener"
  - "Feature lists or bullet points of capabilities"
  - "Claims without evidence or numbers"
  - "Multiple CTAs or asks"
  - "Urgency language ('limited spots', 'act now', 'don't miss out')"
  - "Compliments that feel like flattery ('I'm impressed by your company')"
  - "Attachments, links to decks, or PDFs"
  - "Mentions of fundraising, investors, or company stage"

# Banned words and phrases — quality validator checks for these
banned_phrases:
  - "I hope this finds you well"
  - "I hope this email finds you well"
  - "just wanted to reach out"
  - "just reaching out"
  - "touching base"
  - "I wanted to introduce"
  - "my name is"
  - "I'm reaching out because"
  - "limited time"
  - "act now"
  - "don't miss"
  - "exclusive offer"
  - "we help companies like"
  - "we work with companies"
  - "our platform offers"
  - "our solution provides"
  - "leading provider"
  - "best-in-class"
  - "cutting-edge"
  - "state-of-the-art"
  - "revolutionary"
  - "game-changing"
  - "synergy"
  - "leverage"
  - "paradigm"
  - "I'd love to"
  - "I came across"
  - "in today's"
  - "it's worth noting"
  - "needless to say"
  - "at the end of the day"
  - "moreover"
  - "furthermore"

# Banned characters — quality validator checks for these
banned_characters:
  - "—"  # em dash
  - "–"  # en dash

# Digitillis capabilities — outreach agent selects from these (not all at once)
digitillis_facts:
  - "AI platform that monitors equipment 24/7 and predicts failures up to 18 days before they happen"
  - "45 specialized AI agents across predictive maintenance, quality, energy, compliance"
  - "For F&B: continuous CCP monitoring, FSMA-compliant documentation, audit readiness"
  - "For manufacturing: RUL prediction at 87% confidence, anomaly detection, OEE analytics"
  - "ARIA: conversational AI that lets plant managers ask questions in plain English"
  - "90-day pilot, no long-term commitment, prove ROI or walk away"
  - "Trained on real industrial datasets (NASA, SECOM, Bosch, C-MAPSS)"

# Max words per email (by sequence step)
max_words:
  step_1: 150
  step_2: 120
  step_3: 130
  step_4: 100
  default: 150

# Subject line rules
subject_line_rules: |
  - Under 50 characters
  - Must reference their company name or specific situation
  - No generic subjects like "Quick question" or "Following up"
  - No ALL CAPS or excessive punctuation
