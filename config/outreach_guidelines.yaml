# Max words per email (by sequence step)
max_words:
  step_1: 150
  step_2: 120
  step_3: 130
  step_4: 100
  default: 150

# Subject line rules
subject_line_rules: |
  - Under 50 characters
  - Must reference their company name or specific situation
  - No generic subjects like "Quick question" or "Following up"
  - No ALL CAPS or excessive punctuation
