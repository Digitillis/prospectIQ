# Product capabilities — outreach agent selects from these (not all at once)
# Configure these for your own product in offer_context.yaml (capabilities section).
product_facts:
  - "AI platform that monitors equipment 24/7 and predicts failures up to 18 days before they happen"
  - "45 specialized AI agents across predictive maintenance, quality, energy, compliance"
  - "For F&B: continuous CCP monitoring, FSMA-compliant documentation, audit readiness"
  - "For manufacturing: RUL prediction at 87% confidence, anomaly detection, OEE analytics"
  - "ARIA: conversational AI that lets plant managers ask questions in plain English"
  - "90-day pilot, no long-term commitment, prove ROI or walk away"
  - "Trained on real industrial datasets (NASA, SECOM, Bosch, C-MAPSS)"

# Max words per email (by sequence step)
max_words:
  step_1: 150
  step_2: 120
  step_3: 130
  step_4: 100
  default: 150

# Opening line rules — enforced at draft generation time
opening_line_rules: |
  HARD RULE: The opening sentence MUST reference a specific, verifiable fact about THIS
  company — a named acquisition, a specific equipment class they run, a customer they
  serve, a regulatory event, or a specific product line. The fact must be something that
  could only be written about this company, not any company in their sector.

  Model example (Waupaca): "Bain took Proterial private in 2023 — that level of PE
  scrutiny usually means every maintenance dollar gets interrogated."

  ANTI-PATTERN (hard block): Do NOT open with a category observation about the industry
  or equipment type in general. Examples of forbidden openers:
  - "Roll forming lines running at high utilization don't give much warning."
  - "Plants running CNC equipment at high volumes face significant downtime risk."
  - "X equipment is hard to maintain."
  - "Plants running Y see Z."
  These read as templated and signal no research was done. They are rejected.

# Subject line rules
subject_line_rules: |
  - Under 50 characters
  - Must reference their company name or specific situation
  - No generic subjects like "Quick question" or "Following up"
  - No ALL CAPS or excessive punctuation
  - ROTATION RULE: No more than 1 in 3 subjects in a company's sequence may use the
    "[asset class] + downtime + at + [company]" formula (e.g. "CNC downtime at Camcraft").
    Use one of these alternative formulas for the remaining steps:
    (a) Trigger event hook: "[Company]: [specific event implication]"
        Example: "Waupaca: post-acquisition ops scrutiny"
    (b) Business consequence hook: "[Company] [downstream business risk]"
        Example: "Central States dealer network risk"
    (c) Technical specificity hook: "[specific technical term] at [Company]"
        Example: "Spindle health at Camcraft's CNC lines"
