      cold: 0
      delivered: 2
      opened: 5
      engaged: 10
      interested: 15
      evaluating: 20
      committed: 25

# =========================================================
# QUALIFICATION THRESHOLDS
# =========================================================
#
# Two sets of thresholds:
# - pre_research: Applied to "discovered" companies (only firmographic data available)
#   Max possible score = 25 (firmographic dimension only). Tech/timing/engagement = 0.
# - post_research: Applied to "researched" companies (all 4 dimensions scored)
#   Max possible score = 100.

# Pre-research thresholds (firmographic-only, max 25 pts)
pre_research_thresholds:
  disqualify:
    max_score: 4        # Below 5 = clearly outside ICP (no revenue/employee fit)
    action: "disqualify"
    new_status: "disqualified"
  pass_to_research:
    max_score: 25       # 5+ = proceed to research
    action: "pass"
    new_status: null     # stays as "discovered", eligible for research agent

# Post-research thresholds (full 4-dimension, max 100 pts)
thresholds:
  unqualified:
    max_score: 9
    action: "disqualify"
    new_status: "disqualified"
  research_needed:
    max_score: 19
    action: "flag_for_review"
    new_status: null  # stays at current status (score 10-19: hold, don't consume enrichment credits)
  qualified:
    max_score: 39
    action: "qualify"
    new_status: "qualified"
  high_priority:
    max_score: 69
    action: "qualify_priority"
    new_status: "qualified"
    priority_flag: true
  hot_prospect:
    max_score: 100
    action: "qualify_urgent"
    new_status: "qualified"
    priority_flag: true

# Minimum firmographic score to proceed to research (pre-filter)
# Set to 0: People API search doesn't return revenue/employee data,
# so discovered companies start at PQS=0. Research fills in the gaps.
min_firmographic_for_research: 0
