# ProspectIQ — Prospect Quality Score (PQS) Configuration
# 4 dimensions, 0-25 points each, total 0-100
# All weights and keywords editable without code changes
#
# ICP alignment (updated 2026-04-01):
#   Revenue: $100M-$2B (T1: $100M-$400M, T2: $400M-$1B bullseye, T3: $1B-$2B manual)
#   Employees: 200-3,500
#   Primary: ALL industrial manufacturing (discrete + process)
#   Secondary: Food & Beverage (ops/uptime angle only, NOT FSMA)

version: "2.0"

dimensions:
  # =========================================================
  # DIMENSION 1: Firmographic Fit (0-25 pts)
  # Source: Apollo data (available at discovery time)
  # =========================================================
  firmographic:
    max_points: 25
    signals:
      industrial_manufacturer:
        points: 5
        description: "Industrial manufacturing company (NAICS 32-33, 211, 212, 221, 322, 324, 325)"
        source: "apollo"
        evaluation: "naics_prefix_match"
        qualifying_prefixes: ["32", "33", "211", "212", "221", "322", "324", "325", "326", "327"]

      revenue_t2_bullseye:
        points: 8
        description: "Revenue $400M-$1B — T2 bullseye, 60% of outreach effort"
        source: "apollo"
        evaluation: "revenue_range"
        min: 400000000
        max: 1000000000

      revenue_t1:
        points: 6
        description: "Revenue $100M-$400M — T1 fast pilots, VP can sign"
        source: "apollo"
        evaluation: "revenue_range"
        min: 100000000
        max: 400000000

      revenue_extended:
        points: 4
        description: "Revenue $75M-$100M — extended floor (strong F&B and smaller mfg)"
        source: "apollo"
        evaluation: "revenue_range"
        min: 75000000
        max: 100000000

      revenue_t3:
        points: 3
        description: "Revenue $1B-$2B — T3 qualifies but manual outreach only"
        source: "apollo"
        evaluation: "revenue_range"
        min: 1000000000
        max: 2000000000

      employee_count:
        points: 4
        description: "200-3,500 employees (ICP sweet spot)"
        source: "apollo"
        evaluation: "employee_range"
        min: 200
        max: 3500

      us_midwest_primary:
        points: 3
        description: "Located in Midwest manufacturing belt (primary territory)"
        source: "apollo"
        evaluation: "state_match"
        qualifying_states: ["IL", "IN", "MI", "OH", "WI", "MN", "IA", "MO", "KY", "PA"]

      multi_plant_operations:
        points: 4
        description: "Multi-plant / multi-site footprint (larger deal, more assets to monitor)"
        source: "apollo"
        evaluation: "keyword_match"
        keywords:
          - "multiple plants"
          - "multi-plant"
          - "multi-site"
          - "plant network"
          - "manufacturing network"
          - "multiple facilities"
          - "several plants"
          - "plants across"
          - "facilities across"
          - "manufacturing locations"

      continuous_operations:
        points: 3
        description: "24/7 continuous process operations — downtime cost is highest"
        source: "apollo"
        evaluation: "keyword_match"
        keywords:
          - "24/7"
          - "24 hours"
          - "continuous production"
          - "continuous process"
          - "continuous operations"
          - "around the clock"
          - "nonstop production"
          - "shift operations"
          - "three shift"
          - "continuous manufacturing"

