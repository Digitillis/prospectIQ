name: Deploy to Production

# Manual trigger only. There is no push- or schedule-based production deploy.
# Every production deployment requires an explicit human action in the GitHub UI.
#
# Usage:
#   1. Go to Actions > Deploy to Production > Run workflow
#   2. Type exactly: deploy-production
#   3. Click Run workflow
#
# The confirmation input is a hard guard — any other value aborts immediately.
# RAILWAY_TOKEN must be set in GitHub repository secrets.

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type exactly "deploy-production" to proceed'
        required: true
        type: string

jobs:
  guard:
    name: Confirm deployment intent
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation text
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "deploy-production" ]; then
            echo "ABORTED: Confirmation text does not match."
            echo "Expected: deploy-production"
            echo "Got:      ${{ github.event.inputs.confirmation }}"
            exit 1
          fi
          echo "Confirmation accepted. Proceeding with production deployment."

  deploy:
    name: Deploy (Railway production)
    runs-on: ubuntu-latest
    needs: [guard]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to production environment
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Deploying SHA ${{ github.sha }} to Railway production environment..."
          railway up --environment production --service prospectIQ --detach
          echo "Deploy triggered. Monitor Railway dashboard for completion."
          echo "SHA: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
